<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --bg1:#120516;
  --bg2:#1b0830;
  --txt:#fff;
}

/* ✅ FOND STYLE CFF */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(900px 600px at 10% 0%, rgba(245,8,112,.3), transparent),
    radial-gradient(900px 600px at 90% 0%, rgba(156,39,176,.3), transparent),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

/* ✅ HEADER IDENTIQUE */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:12px 18px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
}

/* ✅ LARGEUR COMME CFF */
.wrap{
  max-width:720px;
  margin:auto;
  padding:80px 16px 16px;
}

/* ✅ CARD */
.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* ✅ ALIGNEMENT CFF */
.row{
  display:flex;
  gap:12px;
}

.col{
  flex:1;
}

/* ✅ INPUT PROPRE */
select,input{
  height:48px;
  width:100%;
  padding:0 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,6,34,.8);
  color:white;
  font-size:18px;
}

/* ✅ BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* ✅ CALENDRIER PROPRE */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day{
  background:rgba(0,0,0,.25);
  border-radius:12px;
  padding:10px;
}

.day b{
  font-size:15px;
}

.options{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.options select{
  height:36px;
  font-size:14px;
}

/* ✅ PROPOSITIONS */
.prop{
  background:rgba(0,0,0,.25);
  border-radius:12px;
  padding:10px;
  margin-top:6px;
}

.vote{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.vote button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

<div class="card">

<div class="row">
  <div class="col">
    <label>👤 Qui es-tu</label>
    <select id="user"></select>
  </div>
</div>

</div>

<div class="card">
  <b>🌴 Vacances</b>

  <div id="cal" class="calendar"></div>
</div>

<div class="card">

<div class="row">
  <div class="col">
    <input id="titre" placeholder="Escape game 🔐">
  </div>
</div>

<div class="row">
  <div class="col">
    <input id="prix" placeholder="Prix">
  </div>
  <div class="col">
    <input id="lien" placeholder="Lien">
  </div>
</div>

<button class="primary" onclick="add()">➕ Ajouter</button>

<b>🔥 Idées</b>
<div id="props"></div>

</div>

</div>

<script>

let model={
  enfants:[
    {id:'alessia',nom:'Alessia',avatar:'🧋'},
    {id:'antonin',nom:'Antonin',avatar:'📷'},
    {id:'clement',nom:'Clément',avatar:'🚴‍♂️'},
    {id:'diego',nom:'Diego',avatar:'⚽'},
    {id:'jeremie',nom:'Jérémie',avatar:'🏑'},
    {id:'yann',nom:'Yann',avatar:'🧔'},
    {id:'melanie',nom:'Mélanie',avatar:'🌸'}
  ],

  propositions:[],
  calendrier:[]
};

/******** INIT ********/
function initCal(){
  if(model.calendrier.length) return;
  const start=new Date();

  for(let i=0;i<10;i++){
    let d=new Date(start);
    d.setDate(d.getDate()+i);

    model.calendrier.push({
      date:d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
    });
  }
}

/******** USERS ********/
function fillUsers(){
  const sel=document.getElementById('user');
  sel.innerHTML='';

  model.enfants.forEach(e=>{
    const o=document.createElement('option');
    o.textContent=e.avatar+" "+e.nom;
    sel.appendChild(o);
  });
}

/******** CAL ********/
function optionsHTML(){
  let html="<option></option>";
  model.propositions.forEach(p=>{
    html+=`<option>${p.titre}</option>`;
  });
  return html;
}

function renderCal(){
  const c=document.getElementById('cal');
  c.innerHTML='';

  model.calendrier.forEach(d=>{
    c.innerHTML+=`
      <div class="day">
        <b>📅 ${d.date}</b>
        <div class="options">
          <select>${optionsHTML()}</select>
          <select>${optionsHTML()}</select>
        </div>
      </div>
    `;
  });
}

/******** PROPS ********/
function renderProps(){
  const p=document.getElementById('props');
  p.innerHTML='';

  model.propositions.forEach(x=>{
    p.innerHTML+=`
      <div class="prop">
        🎯 ${x.titre}<br>
        💰 ${x.prix}<br>
        ${x.lien?`🔗 <a href="${x.lien}" target="_blank">voir</a><br>`:''}

        <div class="vote">
          👍 ${x.votes}
          <button onclick="vote(${x.id})">+1</button>
        </div>
      </div>
    `;
  });
}

function vote(id){
  const p=model.propositions.find(x=>x.id==id);
  p.votes++;
  renderProps();
}

function add(){
  const titre=document.getElementById('titre').value;
  const prix=document.getElementById('prix').value;
  const lien=document.getElementById('lien').value;

  if(!titre) return;

  model.propositions.push({
    id:Date.now(),
    titre,
    prix,
    lien,
    votes:0
  });

  renderProps();
  renderCal();
}

/******** INIT ********/
function load(){
  initCal();
  fillUsers();
  renderCal();
  renderProps();
}

window.onload=load;

function goBack(){
  window.location.href='?page=index';
}

</script>

</body>
</html>
