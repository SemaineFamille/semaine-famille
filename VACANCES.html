<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

/* 🌈 FOND PLUS CLAIR */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(700px 500px at 10% 0%, rgba(255,255,255,.2), transparent),
    radial-gradient(700px 500px at 90% 0%, rgba(255,255,255,.2), transparent),
    linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  box-sizing:border-box;
  z-index:10;

  padding:12px 26px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin-right:6px;              /* ✅ ; manquant corrigé */
  padding:92px 16px 16px;        /* ✅ un peu plus pour éviter tout chevauchement */
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,.85);
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* GRID ALIGNEMENT */
.row{
  display:flex;
  gap:10px;                      /* ✅ petit espace constant */
}

.col{
  flex:1;
  min-width:0;                   /* ✅ évite les dépassements/chevauchements en flex */
}

/* INPUT */
select,input{
  height:48px;
  width:100%;
  padding:0 12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  box-sizing:border-box;         /* ✅ essentiel pour que 100% n’overflow pas */
}

/* ✅ Menu déroulant utilisateur plus court */
#user{
  max-width:340px;               /* ✅ ne prend plus toute la page */
}

/* Si tu veux l'aligner à gauche tout en restant "court" */
.card label + #user{
  display:block;
}

/* ✅ En mobile très étroit : prix/lien passent en colonne proprement */
@media (max-width: 380px){
  .row{
    flex-wrap:wrap;
  }
  .row .col{
    flex-basis:100%;
  }
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* ✅ CALENDRIER */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day{
  background:white;
  border-radius:12px;
  padding:10px;
}

.day b{
  font-size:16px;
}

.options{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.options select{
  height:38px;
  font-size:15px;
}

/* ✅ PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}

.vote{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

.vote button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

  <div class="card">
    <label>👤 Qui es-tu</label>
    <select id="user"></select>
  </div>

  <div class="card">
    <b>🌴 Vacances</b>
    <div id="cal" class="calendar"></div>
  </div>

  <div class="card">

    <div class="row">
      <div class="col">
        <input id="titre" placeholder="Karting 🏎 / Escape 🔐">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <input id="prix" placeholder="Prix">
      </div>
      <div class="col">
        <input id="lien" placeholder="Lien">
      </div>
    </div>

    <button class="primary" onclick="add()">➕ Ajouter</button>

    <b>🔥 Idées proposées</b>
    <div id="props"></div>

  </div>

</div>

<script>
/** 🔌 Mets ici l’URL de ton Apps Script déployé (Web App) */
const API_URL = "https://script.google.com/macros/s/AKfycbzUKrmzXep1WFNasSbZcQvYpfmybypxWwS_GAecMYPRE0_f0ipQRfT7j9xNZtiZs0ED/exec";
console.log("VACANCES chargé, API_URL =", API_URL);
  
/** Modèle local, mais alimenté par l’API */
let model = {
  enfants: [],
  propositions: [],
  calendrier: [] // contiendra des objets {dateKey, dateLabel, ...}
};

/* =========================
   API HELPERS
========================= */
async function apiGET(action){
  const r = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`);
  return await r.json();
}

async function apiPOST(payload){
  const r = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });
  return await r.json();
}

/* =========================
   LOAD DATA FROM SHEETS
========================= */
async function loadFromAPI(){
  console.log("Appel API getAll...");
  const res = await apiGET("getAll");
  if(!res.ok) {
    console.error(res.error);
    alert("Erreur API: " + res.error);
    return;
  }

  // ⚠️ Les champs renvoyés par le script
  const data = res.data;

  // enfants: [{id, nom, avatar}]
  model.enfants = (data.enfants || []).map(e => ({
    id: String(e.id || ""),
    nom: String(e.nom || ""),
    avatar: String(e.avatar || "")
  }));

  // propositions: [{id,titre,prix,lien,votes}]
  model.propositions = (data.propositions || []).map(p => ({
    id: String(p.id || ""),
    titre: String(p.titre || ""),
    prix: String(p.prix || ""),
    lien: String(p.lien || ""),
    votes: Number(p.votes || 0)
  }));

  // calendrier: lignes de la sheet calendrier (base + lignes user)
  // Le script a des colonnes: dateKey, dateLabel, userId, choice1, choice2
  model.calendrier = (data.calendrier || []).map(c => ({
    dateKey: String(c.dateKey || ""),
    dateLabel: String(c.dateLabel || ""),
    userId: String(c.userId || ""),
    choice1: String(c.choice1 || ""),
    choice2: String(c.choice2 || "")
  }));

  fillUsers();
  renderProps();
  renderCal();
}

/* =========================
   UI : USERS
========================= */
function getSelectedUserId(){
  const sel = document.getElementById("user");
  return sel.value; // on mettra value = id
}

function fillUsers(){
  const sel = document.getElementById('user');
  sel.innerHTML = '';

  model.enfants.forEach(e => {
    sel.innerHTML += `<option value="${escapeHtml(e.id)}">${escapeHtml(e.avatar)} ${escapeHtml(e.nom)}</option>`;
  });

  // Quand on change d'utilisateur, on re-render le calendrier (pour afficher ses choix)
  sel.onchange = () => renderCal();
}

/* =========================
   UI : PROPOSITIONS
========================= */
function renderProps(){
  const p = document.getElementById('props');
  p.innerHTML = '';

  model.propositions.forEach(x => {
    p.innerHTML += `
      <div class="prop">
        <b>🎯 ${escapeHtml(x.titre)}</b><br>
        💰 ${escapeHtml(x.prix || '-')}<br>
        ${x.lien ? `🔗 <a href="${escapeAttr(x.lien)}" target="_blank">voir</a><br>` : ''}

        <div class="vote">
          👍 ${Number(x.votes || 0)}
          <button onclick="vote('${escapeAttr(x.id)}')">+1</button>
        </div>
      </div>
    `;
  });
}

async function add(){
  const titre = document.getElementById('titre').value.trim();
  const prix  = document.getElementById('prix').value.trim();
  const lien  = document.getElementById('lien').value.trim();

  if(!titre) return;

  const res = await apiPOST({ action:"addProp", titre, prix, lien });
  if(!res.ok){
    alert("Erreur addProp: " + res.error);
    return;
  }

  // Recharge tout pour rester synchro
  document.getElementById('titre').value = '';
  document.getElementById('prix').value = '';
  document.getElementById('lien').value = '';

  await loadFromAPI();
}

async function vote(id){
  const res = await apiPOST({ action:"vote", id });
  if(!res.ok){
    alert("Erreur vote: " + res.error);
    return;
  }
  await loadFromAPI();
}

/* =========================
   UI : CALENDRIER (14 jours)
   Affiche 14 dates "base" + les choix de l'utilisateur sélectionné
========================= */
function optionsHTML(selectedValue){
  let html = `<option value=""></option>`;
  model.propositions.forEach(p => {
    const sel = (p.titre === selectedValue) ? "selected" : "";
    html += `<option ${sel} value="${escapeAttr(p.titre)}">${escapeHtml(p.titre)}</option>`;
  });
  return html;
}

function renderCal(){
  const c = document.getElementById('cal');
  c.innerHTML = '';

  const userId = getSelectedUserId();

  // On identifie les 14 lignes "base" (celles dont userId est vide)
  const baseDays = model.calendrier
    .filter(x => !x.userId) // lignes de base
    .slice(0,14);           // sécurité

  baseDays.forEach(day => {
    // Cherche si l'utilisateur a déjà une ligne choix pour cette date
    const userLine = model.calendrier.find(x => x.dateKey === day.dateKey && x.userId === userId);

    const choice1 = userLine ? userLine.choice1 : "";
    const choice2 = userLine ? userLine.choice2 : "";

    c.innerHTML += `
      <div class="day">
        <b>📅 ${escapeHtml(day.dateLabel || day.dateKey)}</b>
        <div class="options">
          <select data-datekey="${escapeAttr(day.dateKey)}" data-slot="1">
            ${optionsHTML(choice1)}
          </select>
          <select data-datekey="${escapeAttr(day.dateKey)}" data-slot="2">
            ${optionsHTML(choice2)}
          </select>
        </div>
      </div>
    `;
  });

  // Ajoute les listeners pour sauvegarder dès qu'on change un select
  c.querySelectorAll("select").forEach(sel => {
    sel.onchange = () => saveChoicesForDay(sel.dataset.datekey);
  });
}

async function saveChoicesForDay(dateKey){
  const userId = getSelectedUserId();
  const box = document.getElementById("cal");

  const s1 = box.querySelector(`select[data-datekey="${CSS.escape(dateKey)}"][data-slot="1"]`);
  const s2 = box.querySelector(`select[data-datekey="${CSS.escape(dateKey)}"][data-slot="2"]`);

  const choice1 = s1 ? s1.value : "";
  const choice2 = s2 ? s2.value : "";

  const res = await apiPOST({ action:"setChoice", dateKey, userId, choice1, choice2 });
  if(!res.ok){
    alert("Erreur setChoice: " + res.error);
    return;
  }

  // Recharge léger : on peut recharger tout pour être sûr que c’est synchro
  await loadFromAPI();
}

/* =========================
   NAV
========================= */
function goBack(){
  window.location.href='?page=index';
}

/* =========================
   INIT
========================= */
window.onload = loadFromAPI;

/* =========================
   SECURITY HELPERS (anti injection dans HTML)
========================= */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[s]));
}
function escapeAttr(str){
  // On échappe au minimum pour attributs
  return escapeHtml(str).replace(/`/g,"&#096;");
}
</script>

</body>
</html>
