<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

/* 🌈 FOND PLUS CLAIR */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(700px 500px at 10% 0%, rgba(255,255,255,.2), transparent),
    radial-gradient(700px 500px at 90% 0%, rgba(255,255,255,.2), transparent),
    linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  box-sizing:border-box;
  z-index:10;

  padding:12px 26px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin-right:6px;
  padding:92px 16px 16px;
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,.85);
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* GRID ALIGNEMENT */
.row{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  min-width:0;
}

/* INPUT */
select,input{
  height:48px;
  width:100%;
  padding:0 12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  box-sizing:border-box;
}

/* ✅ Menu déroulant utilisateur plus court */
#user{
  max-width:340px;
}

/* Si tu veux l'aligner à gauche tout en restant "court" */
.card label + #user{
  display:block;
}

/* ✅ En mobile très étroit : prix/lien passent en colonne proprement */
@media (max-width: 380px){
  .row{
    flex-wrap:wrap;
  }
  .row .col{
    flex-basis:100%;
  }
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* ✅ CALENDRIER */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day{
  background:white;
  border-radius:12px;
  padding:10px;
}

.day b{
  font-size:16px;
}

.options{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.options select{
  height:38px;
  font-size:15px;
}

/* ✅ PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}

.vote{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

.vote button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

  <div class="card">
    <label>👤 Qui es-tu</label>
    <select id="user"></select>
  </div>

  <div class="card">
    
<b onclick="toggleCal()" style="cursor:pointer;">
  🌴 Vacances ⬇
</b>

    <div id="cal" class="calendar" style="display:none;"></div>
  </div>

  <div class="card">

    <div class="row">
      <div class="col">
        <input id="titre" placeholder="Karting 🏎 / Escape 🔐">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <input id="prix" placeholder="Prix">
      </div>
      <div class="col">
        <input id="lien" placeholder="Lien">
      </div>
    </div>

    <button class="primary" onclick="add()">➕ Ajouter</button>

    <b>🔥 Idées proposées</b>
    <div id="props"></div>

  </div>

</div>

<script>
/** 🔌 URL Apps Script WebApp */
const API_URL = "https://script.google.com/macros/s/AKfycbzUKrmzXep1WFNasSbZcQvYpfmybypxWwS_GAecMYPRE0_f0ipQRfT7j9xNZtiZs0ED/exec";
let calVisible = false;

function toggleCal(){
  const cal = document.getElementById("cal");
  calVisible = !calVisible;

  cal.style.display = calVisible ? "grid" : "none";
}
/** Modèle local */
let model = {
  enfants: [],
  propositions: [],
  calendrier: []
};

/* =========================================================
   JSONP helper (pour GitHub Pages -> évite CORS)
   Apps Script peut servir du JSONP via ContentService (callback/prefix). [1](https://developers.google.com/apps-script/guides/content)[6](https://developers.google.com/apps-script/reference/content/)[2](https://developers.google.com/apps-script/guides/content?hl=fr)
========================================================= */
function jsonpCall(params){
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
    params.callback = cbName;

    const qs = new URLSearchParams(params).toString();
    const url = `${API_URL}?${qs}`;

    const s = document.createElement("script");
    s.src = url;
    s.async = true;

    window[cbName] = (data) => {
      try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
      s.remove();
      resolve(data);
    };

    s.onerror = () => {
      try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
      s.remove();
      reject(new Error("JSONP failed"));
    };

    document.head.appendChild(s);
  });
}

async function apiGET(action){
  return await jsonpCall({ action });
}

async function apiPOST(payload){
  // On garde le nom apiPOST pour ne pas toucher au reste,
  // mais en GitHub Pages on passe en GET JSONP (pas de CORS).
  return await jsonpCall(payload);
}

/* =========================
   LOAD DATA
========================= */
async function loadFromAPI(){
  const res = await apiGET("getAll");
  if(!res || !res.ok){
    alert("Erreur API: " + (res && res.error ? res.error : "aucune réponse"));
    return;
  }

  const data = res.data || {};

  model.enfants = (data.enfants || []).map(e => ({
    id: String(e.id || ""),
    nom: String(e.nom || ""),
    avatar: String(e.avatar || "")
  }));

  model.propositions = (data.propositions || []).map(p => ({
    id: String(p.id || ""),
    titre: String(p.titre || ""),
    prix: String(p.prix || ""),
    lien: String(p.lien || ""),
    votes: Number(p.votes || 0),
    // facultatif si ton script renvoie "auteur" / "voters"
    auteur: String(p.auteur || ""),
    voters: String(p.voters || "")
  }));

  model.calendrier = (data.calendrier || []).map(c => ({
    dateKey: String(c.dateKey || ""),
    dateLabel: String(c.dateLabel || ""),
    userId: String(c.userId || ""),
    choice1: String(c.choice1 || ""),
    choice2: String(c.choice2 || "")
  }));

  fillUsers();
  renderProps();
  renderCal();
}

/* =========================
   USERS
========================= */
function getSelectedUserId(){
  const sel = document.getElementById("user");
  return sel ? sel.value : "";
}

function fillUsers(){
  const sel = document.getElementById('user');
  if(!sel) return;

  sel.innerHTML = '';
  model.enfants.forEach(e => {
    sel.innerHTML += `<option value="${escapeAttr(e.id)}">${escapeHtml(e.avatar)} ${escapeHtml(e.nom)}</option>`;
  });

  sel.onchange = () => renderCal();
}

/* =========================
   PROPOSITIONS
========================= */
function renderProps(){
  const p = document.getElementById('props');
  if(!p) return;

  p.innerHTML = '';

  model.propositions.forEach(x => {
    p.innerHTML += `
      <div class="prop">
        <b>🎯 ${escapeHtml(x.titre)}</b><br>
        💰 ${escapeHtml(x.prix || '-') }<br>
        ${x.lien ? `🔗 <a href="${escapeAttr(x.lien)}" target="_blank" rel="noopener">voir</a><br>` : ''}

        <div class="vote">
          👍 ${Number(x.votes || 0)}
          <button onclick="vote('${escapeAttr(x.id)}')">+1</button>
        </div>
      </div>
    `;
  });
}

async function add(){
  const titreEl = document.getElementById('titre');
  const prixEl  = document.getElementById('prix');
  const lienEl  = document.getElementById('lien');

  const titre = (titreEl ? titreEl.value : "").trim();
  const prix  = (prixEl ? prixEl.value : "").trim();
  const lien  = (lienEl ? lienEl.value : "").trim();

  if(!titre) return;

  // (optionnel) si tu veux "nominatif" côté script: envoyer userId aussi
  const userId = getSelectedUserId();

  const res = await apiPOST({ action:"addProp", titre, prix, lien, userId });
  if(!res || !res.ok){
    alert("Erreur addProp: " + (res && res.error ? res.error : "aucune réponse"));
    return;
  }

  if(titreEl) titreEl.value = '';
  if(prixEl)  prixEl.value  = '';
  if(lienEl)  lienEl.value  = '';

  await loadFromAPI();
}

/* ✅ Vote 1 fois / personne : on envoie userId
   -> le blocage doit être appliqué côté Apps Script (voters). */
async function vote(id){
  const userId = getSelectedUserId();
  const res = await apiPOST({ action:"vote", id, userId });

  if(!res || !res.ok){
    alert((res && res.error) ? res.error : "Erreur vote");
    return;
  }
  await loadFromAPI();
}

/* =========================
   CALENDRIER (14 jours)
========================= */
function optionsHTML(selectedValue){
  let html = `<option value=""></option>`;
  model.propositions.forEach(p => {
    const sel = (p.titre === selectedValue) ? "selected" : "";
    html += `<option ${sel} value="${escapeAttr(p.titre)}">${escapeHtml(p.titre)}</option>`;
  });
  return html;
}

function renderCal(){
  const c = document.getElementById('cal');
  if(!c) return;

  c.innerHTML = '';

  const userId = getSelectedUserId();

  const baseDays = model.calendrier
    .filter(x => !x.userId)
    .slice(0,14);

  baseDays.forEach(day => {
    const userLine = model.calendrier.find(x => x.dateKey === day.dateKey && x.userId === userId);
    const choice1 = userLine ? userLine.choice1 : "";
    const choice2 = userLine ? userLine.choice2 : "";

    c.innerHTML += `
      <div class="day">
        <b>📅 ${escapeHtml(day.dateLabel || day.dateKey)}</b>
        <div class="options">
          <select data-datekey="${escapeAttr(day.dateKey)}" data-slot="1">
            ${optionsHTML(choice1)}
          </select>
          <select data-datekey="${escapeAttr(day.dateKey)}" data-slot="2">
            ${optionsHTML(choice2)}
          </select>
        </div>
      </div>
    `;
  });

  c.querySelectorAll("select").forEach(sel => {
    sel.onchange = () => saveChoicesForDay(sel.dataset.datekey);
  });
}

async function saveChoicesForDay(dateKey){
  const userId = getSelectedUserId();
  const box = document.getElementById("cal");

  const s1 = box.querySelector(`select[data-datekey="${CSS.escape(dateKey)}"][data-slot="1"]`);
  const s2 = box.querySelector(`select[data-datekey="${CSS.escape(dateKey)}"][data-slot="2"]`);

  const choice1 = s1 ? s1.value : "";
  const choice2 = s2 ? s2.value : "";

  const res = await apiPOST({ action:"setChoice", dateKey, userId, choice1, choice2 });
  if(!res || !res.ok){
    alert("Erreur setChoice: " + (res && res.error ? res.error : "aucune réponse"));
    return;
  }

  await loadFromAPI();
}

/* =========================
   NAV (anti-404 GitHub Pages)
   - marche si site user (/) OU projet (/repo/)
========================= */
function goBack(){
  const parts = window.location.pathname.split('/').filter(Boolean);
  const base = (parts.length >= 2 && !parts[0].includes('.')) ? '/' + parts[0] : '';
  window.location.href = window.location.origin + base + '/index.html';
}

/* =========================
   INIT
========================= */
window.onload = loadFromAPI;

/* =========================
   SECURITY HELPERS
========================= */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[ch]));
}

function escapeAttr(str){
  return escapeHtml(str).replace(/`/g,"&#96;");
}
</script>

</body>
</html>
