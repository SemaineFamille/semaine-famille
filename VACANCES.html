<!DOCTYPE html>
<html lang="fr">
<head>
<base target="_top">

<style>
body{
  font-family:system-ui;
  margin:0;
  background:linear-gradient(135deg,#7b1fa2,#f06292);
  color:white;
  font-size:26px; /* ✅ BEAUCOUP PLUS GRAND */
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  padding:12px;
}

.btn{
  border:none;
  border-radius:18px;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

/* LAYOUT */
.wrap{padding:12px;}

.card{
  background:white;
  color:black;
  border-radius:22px;
  padding:20px;
  margin-bottom:16px;
}

/* INPUT */
select,input{
  width:100%;
  padding:18px;
  font-size:22px;
  border-radius:16px;
  margin-top:10px;
}

/* ✅ CALENDRIER PLUS COMPACT */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* ✅ CASE JOUR */
.day{
  background:white;
  color:black;
  border-radius:20px;
  padding:12px;
  font-size:18px;
}

/* ✅ TITRE PLUS GROS */
.dayTitle{
  font-size:20px;
  font-weight:bold;
  margin-bottom:8px;
}

/* ✅ 2 CHOIX HORIZONTAUX */
.options{
  display:flex;
  gap:6px;
  margin-top:6px;
}

/* ✅ SELECT PETIT MAIS LISIBLE */
.options select{
  flex:1;
  font-size:16px;
  padding:10px;
}

/* PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:18px;
  padding:14px;
  margin-top:12px;
  font-size:18px;
}

.vote{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.vote button{
  font-size:16px;
  padding:10px;
  border-radius:12px;
  border:none;
  background:#9C27B0;
  color:white;
}
</style>

<script>

let model={
  enfants:[
    {id:'alessia',nom:'Alessia',avatar:'🧋'},
    {id:'antonin',nom:'Antonin',avatar:'📷'},
    {id:'clement',nom:'Clément',avatar:'🚴‍♂️'},
    {id:'diego',nom:'Diego',avatar:'⚽'},
    {id:'jeremie',nom:'Jérémie',avatar:'🏑'},
    {id:'yann',nom:'Yann',avatar:'🧔'},
    {id:'melanie',nom:'Mélanie',avatar:'🌸'}
  ],

  propositions:[
    {id:'1',titre:'Cinéma 🎬',prix:'15 CHF',lien:'',votes:0},
    {id:'2',titre:'Piscine 🏊',prix:'5 CHF',lien:'',votes:2}
  ],

  calendrier:[]
};

/******** CALENDRIER ********/
function generateCalendar(){
  if(model.calendrier.length) return;

  const start=new Date();
  for(let i=0;i<10;i++){
    let d=new Date(start);
    d.setDate(d.getDate()+i);

    model.calendrier.push({
      date:d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}),
      c1:'',
      c2:''
    });
  }
}

/******** USERS ********/
function fillUsers(){
  const sel=document.getElementById('user');
  sel.innerHTML='';

  model.enfants.forEach(e=>{
    const o=document.createElement('option');
    o.value=e.id;
    o.textContent=e.avatar+" "+e.nom;
    sel.appendChild(o);
  });
}

/******** PROPOSITIONS ********/
function renderProps(){
  const cont=document.getElementById('props');
  cont.innerHTML='';

  model.propositions.forEach(p=>{
    const div=document.createElement('div');
    div.className='prop';

    div.innerHTML=`
      <div>🎯 <b>${p.titre}</b></div>
      <div>💰 ${p.prix || '-'}</div>
      ${p.lien ? `<div>🔗 <a href="${p.lien}" target="_blank">Voir</a></div>`:''}

      <div class="vote">
        <span>👍 ${p.votes}</span>
        <button onclick="vote('${p.id}')">👍</button>
      </div>
    `;

    cont.appendChild(div);
  });
}

function vote(id){
  const p=model.propositions.find(x=>x.id==id);
  p.votes++;
  renderProps();
}

/******** CALENDRIER ********/
function buildOptions(){
  let html=`<option value="">--</option>`;
  model.propositions.forEach(p=>{
    html+=`<option>${p.titre}</option>`;
  });
  return html;
}

function renderCalendar(){
  const cont=document.getElementById('cal');
  cont.innerHTML='';

  model.calendrier.forEach(day=>{
    const div=document.createElement('div');
    div.className='day';

    div.innerHTML=`
      <div class="dayTitle">📅 ${day.date}</div>

      <div class="options">
        <select>${buildOptions()}</select>
        <select>${buildOptions()}</select>
      </div>
    `;

    cont.appendChild(div);
  });
}

/******** ADD ********/
function add(){
  const titre=document.getElementById('titre').value;
  const prix=document.getElementById('prix').value;
  const lien=document.getElementById('lien').value;

  if(!titre) return;

  model.propositions.push({
    id:Date.now(),
    titre,
    prix,
    lien,
    votes:0
  });

  renderProps();
  renderCalendar();
}

/******** LOAD ********/
function load(){
  generateCalendar();
  fillUsers();
  renderProps();
  renderCalendar();
}

window.onload=load;

function goBack(){
  window.location.href='?page=index';
}

</script>

</head>

<body>

<div class="topbar">
  <button class="btn back" onclick="goBack()">⬅Retour</button>
</div>

<div class="wrap">

<div class="card">
  <h2>👤 Qui es-tu ?</h2>
  <select id="user"></select>
</div>

<div class="card">
  <h2>🌴 Vacances</h2>
  <div id="cal" class="calendar"></div>
</div>

<div class="card">
  <h2>💡 Ajouter une idée</h2>

  <input id="titre" placeholder="Karting 🏎 / Escape 🔐">
  <input id="prix" placeholder="prix">
  <input id="lien" placeholder="site web">

  <button class="btn" style="background:#00E5FF;color:black" onclick="add()">Ajouter</button>

  <h3>🔥 Idées</h3>
  <div id="props"></div>
</div>

</div>

</body>
</html>
