<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

/* 🌈 FOND PLUS CLAIR */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(700px 500px at 10% 0%, rgba(255,255,255,.2), transparent),
    radial-gradient(700px 500px at 90% 0%, rgba(255,255,255,.2), transparent),
    linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  box-sizing:border-box;
  z-index:10;

  padding:12px 26px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin-right:6px;              /* ✅ ; manquant corrigé */
  padding:92px 16px 16px;        /* ✅ un peu plus pour éviter tout chevauchement */
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,.85);
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* GRID ALIGNEMENT */
.row{
  display:flex;
  gap:10px;                      /* ✅ petit espace constant */
}

.col{
  flex:1;
  min-width:0;                   /* ✅ évite les dépassements/chevauchements en flex */
}

/* INPUT */
select,input{
  height:48px;
  width:100%;
  padding:0 12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  box-sizing:border-box;         /* ✅ essentiel pour que 100% n’overflow pas */
}

/* ✅ Menu déroulant utilisateur plus court */
#user{
  max-width:340px;               /* ✅ ne prend plus toute la page */
}

/* Si tu veux l'aligner à gauche tout en restant "court" */
.card label + #user{
  display:block;
}

/* ✅ En mobile très étroit : prix/lien passent en colonne proprement */
@media (max-width: 380px){
  .row{
    flex-wrap:wrap;
  }
  .row .col{
    flex-basis:100%;
  }
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* ✅ CALENDRIER */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day{
  background:white;
  border-radius:12px;
  padding:10px;
}

.day b{
  font-size:16px;
}

.options{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.options select{
  height:38px;
  font-size:15px;
}

/* ✅ PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}

.vote{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

.vote button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

  <div class="card">
    <label>👤 Qui es-tu</label>
    <select id="user"></select>
  </div>

  <div class="card">
    <b>🌴 Vacances</b>
    <div id="cal" class="calendar"></div>
  </div>

  <div class="card">

    <div class="row">
      <div class="col">
        <input id="titre" placeholder="Karting 🏎 / Escape 🔐">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <input id="prix" placeholder="Prix">
      </div>
      <div class="col">
        <input id="lien" placeholder="Lien">
      </div>
    </div>

    <button class="primary" onclick="add()">➕ Ajouter</button>

    <b>🔥 Idées proposées</b>
    <div id="props"></div>

  </div>

</div>

<script>
let model={
  enfants:[
    {id:'alessia',nom:'Alessia',avatar:'🧋'},
    {id:'antonin',nom:'Antonin',avatar:'📷'},
    {id:'clement',nom:'Clément',avatar:'🚴‍♂️'},
    {id:'diego',nom:'Diego',avatar:'⚽'},
    {id:'jeremie',nom:'Jérémie',avatar:'🏑'},
    {id:'yann',nom:'Yann',avatar:'🧔'},
    {id:'melanie',nom:'Mélanie',avatar:'🌸'}
  ],
  propositions:[],
  calendrier:[]
};

/* INIT CAL */
function initCal(){
  if(model.calendrier.length) return;

  const start=new Date();
  for(let i=0;i<14;i++){  // ✅ 14 jours au lieu de 10
    let d=new Date(start);
    d.setDate(d.getDate()+i);

    model.calendrier.push({
      date:d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
    });
  }
}

/* USERS */
function fillUsers(){
  const sel=document.getElementById('user');
  sel.innerHTML='';
  model.enfants.forEach(e=>{
    sel.innerHTML+=`<option>${e.avatar} ${e.nom}</option>`;
  });
}

/* CAL */
function optionsHTML(){
  let html="<option></option>";
  model.propositions.forEach(p=>{
    html+=`<option>${p.titre}</option>`;
  });
  return html;
}

function renderCal(){
  const c=document.getElementById('cal');
  c.innerHTML='';

  model.calendrier.forEach(d=>{
    c.innerHTML+=`
      <div class="day">
        <b>📅 ${d.date}</b>
        <div class="options">
          <select>${optionsHTML()}</select>
          <select>${optionsHTML()}</select>
        </div>
      </div>
    `;
  });
}

/* PROPS */
function renderProps(){
  const p=document.getElementById('props');
  p.innerHTML='';

  model.propositions.forEach(x=>{
    p.innerHTML+=`
      <div class="prop">
        <b>🎯 ${x.titre}</b><br>
        💰 ${x.prix || '-'}<br>
        ${x.lien?`🔗 <a href="${x.lien}" target="_blank">voir</a><br>`:''}

        <div class="vote">
          👍 ${x.votes}
          <button onclick="vote(${x.id})">+1</button>
        </div>
      </div>
    `;
  });
}

/* VOTE */
function vote(id){
  const p=model.propositions.find(x=>x.id==id);
  p.votes++;
  renderProps();
}

/* ADD */
function add(){
  const titre=document.getElementById('titre').value;
  const prix=document.getElementById('prix').value;
  const lien=document.getElementById('lien').value;

  if(!titre) return;

  model.propositions.push({
    id:Date.now(),
    titre,
    prix,
    lien,
    votes:0
  });

  renderProps();
  renderCal();
}

/* INIT */
function load(){
  initCal();
  fillUsers();
  renderCal();
  renderProps();
}
window.onload=load;

function goBack(){
  window.location.href='?page=index';
}
</script>

</body>
</html>
