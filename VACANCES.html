<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

/* 🌈 FOND PLUS CLAIR */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(700px 500px at 10% 0%, rgba(255,255,255,.2), transparent),
    radial-gradient(700px 500px at 90% 0%, rgba(255,255,255,.2), transparent),
    linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  box-sizing:border-box;
  z-index:10;

  padding:12px 26px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin-right:6px;
  padding:92px 16px 16px;
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,.85);
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* GRID ALIGNEMENT */
.row{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  min-width:0;
}

/* INPUT */
select,input{
  height:48px;
  width:100%;
  padding:0 12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  box-sizing:border-box;
}

/* ✅ Menu déroulant utilisateur plus court */
#user{
  max-width:340px;
}

/* Si tu veux l'aligner à gauche tout en restant "court" */
.card label + #user{
  display:block;
}

/* ✅ En mobile très étroit : prix/lien passent en colonne proprement */
@media (max-width: 380px){
  .row{
    flex-wrap:wrap;
  }
  .row .col{
    flex-basis:100%;
  }
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* ✅ CALENDRIER */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day{
  background:white;
  border-radius:12px;
  padding:10px;
}

.day b{
  font-size:16px;
}

.options{
  display:flex;
  flex-direction:column;  /* ✅ met les éléments en colonne */
  gap:8px;
  margin-top:8px;
}

.options select{
  height:42px;
  font-size:16px;
  width:100%; /* ✅ bien aligné */
}


/* ✅ PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}

.vote{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

.vote button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">🔙 Retour</button>
</div>

<div class="wrap">

  <div class="card">
    <label>❓Qui es-tu❓</label>
    <select id="user"></select>
  </div>

  <div class="card">
    

<b id="vacTitle" onclick="toggleCal()" style="cursor:pointer;">
  🌴 Vacances ⛱️ ⬇️
</b>


    <div id="cal" class="calendar" style="display:none;"></div>
  </div>

  <div class="card">

    <div class="row">
      <div class="col">
        <input id="titre" placeholder="Lac 🚣‍♀️ / VTT 🚵🏼‍♀️">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <input id="prix" placeholder="💰Prix">
      </div>
      <div class="col">
        <input id="lien" placeholder="💾Lien">
      </div>
    </div>

    <button class="primary" onclick="add()">➕ Ajouter</button>

    <b>🔥 Idées proposées</b>
    <div id="props"></div>

  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzUKrmzXep1WFNasSbZcQvYpfmybypxWwS_GAecMYPRE0_f0ipQRfT7j9xNZtiZs0ED/exec";

/* ================= CAL (toggle) ================= */
let calVisible = false;


function toggleCal(){
  const cal = document.getElementById("cal");
  calVisible = !calVisible;
  cal.style.display = calVisible ? "grid" : "none";

  const title = document.getElementById("vacTitle");
  if(title) title.innerHTML = calVisible ? "🌴 Vacances ⛱️ ⬆️" : "🌴 Vacances ⛱️ ⬇️";
}
function formatDateFR(dateStr){
  if(!dateStr) return "";

  let d;

  // Cas ISO (ton problème actuel)
  if(dateStr.includes("T")){
    d = new Date(dateStr);

    // ✅ correction fuseau (très important)
    d = new Date(d.getTime() + (d.getTimezoneOffset() * 60000));
  }
  // Cas "25.06.2026"
  else if(dateStr.includes(".")){
    const [day, month, year] = dateStr.split(".");
    d = new Date(year, month - 1, day);
  }
  else{
    d = new Date(dateStr);
  }

  if(isNaN(d)) return dateStr;

  const jours = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
  const mois = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]}`;
}
/* ================= CAL SAVE ================= */
async function saveCal(dateLabel, slot, propId){
  const userId = getSelectedUserId();

  if(!userId){
    alert("Choisis d’abord qui tu es (menu 👤) pour remplir le calendrier.");
    return;
  }

  // secours immédiat côté navigateur
  setLocalCal(dateLabel, slot, propId);

  // tentative de sauvegarde API (si ton back-end a l'action)
  const res = await apiPOST({
    action: "setCal",     // <-- si ton Apps Script utilise un autre nom, change ici
    dateLabel,
    slot,
    propId,
    userId
  });

  if(!res || !res.ok){
    // On garde la valeur locale ; on prévient juste.
    console.warn("Sauvegarde calendrier API impossible:", res?.error);
    // optionnel : alert douce
    // alert(res?.error || "Le calendrier a été enregistré localement (API indisponible).");
    return;
  }

  loadFromAPI();
}
/* ================= MODEL ================= */
let model = {
  enfants: [],
  propositions: [],
  calendrier: []
};
/* ================= HELPERS (maps + localStorage) ================= */
function enfantsById(){
  const m = new Map();
  (model.enfants || []).forEach(e => m.set(String(e.id), e));
  return m;
}

const LS_USER_KEY = "fam_userId";
const LS_CAL_KEY  = "fam_calSelections"; // secours local si API calendrier pas prête

function getSavedUserId(){
  return localStorage.getItem(LS_USER_KEY) || "";
}

function saveUserId(id){
  if(id) localStorage.setItem(LS_USER_KEY, id);
}

function getLocalCal(){
  try { return JSON.parse(localStorage.getItem(LS_CAL_KEY) || "{}"); }
  catch(e){ return {}; }
}

function setLocalCal(dateLabel, slot, propId){
  const cal = getLocalCal();
  if(!cal[dateLabel]) cal[dateLabel] = { slot1:"", slot2:"" };
  cal[dateLabel]["slot"+slot] = propId || "";
  localStorage.setItem(LS_CAL_KEY, JSON.stringify(cal));
}

function getDayRemoteSlot(day, slot){
  // Supporte plusieurs noms possibles sans casser si l'API change
  const keys1 = ["slot1","activite1","a1","am"];
  const keys2 = ["slot2","activite2","a2","pm"];
  const keys = slot === 1 ? keys1 : keys2;

  for(const k of keys){
    if(day && day[k] != null && String(day[k]).trim() !== "") return String(day[k]);
  }
  return "";
}

function buildPropOptions(selectedId){
  const sel = String(selectedId || "");
  const list = (model.propositions || []).slice();

  // Trier par votes décroissants (optionnel mais pratique)
  list.sort((a,b) => (Number(b.votes||0) - Number(a.votes||0)));

  const base = [`<option value="">— Choisir une activité —</option>`];

  list.forEach(p => {
    const id = String(p.id);
    const votes = Number(p.votes || 0);
    const label = `${escapeHtml(p.titre || "-")} (${votes} 👍)`;
    base.push(`<option value="${id}" ${id===sel ? "selected":""}>${label}</option>`);
  });

  return base.join("");
}
/* ================= API ================= */
function jsonpCall(params){
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now();
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params);

    const s = document.createElement("script");
    s.src = url;

    window[cb] = (data)=>{
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = ()=>reject("erreur API");

    document.body.appendChild(s);
  });
}

async function apiGET(action){
  return await jsonpCall({ action });
}

async function apiPOST(payload){
  return await jsonpCall(payload);
}

/* ================= LOAD ================= */
async function loadFromAPI(){
  const res = await apiGET("getAll");

  if(!res || !res.ok){
    alert(res?.error || "Erreur API");
    return;
  }

  const data = res.data || {};

  model.enfants = data.enfants || [];
  model.propositions = data.propositions || [];
  model.calendrier = data.calendrier || [];

  fillUsers();
  renderProps();
  renderCal();
}

/* ================= USERS ================= */

function getSelectedUserId(){
  const sel = document.getElementById("user");
  return sel ? String(sel.value || "") : "";
}

function fillUsers(){
  const sel = document.getElementById("user");
  sel.innerHTML = "";

  if(!model.enfants || model.enfants.length === 0){
    sel.innerHTML = `<option value="">— Aucun utilisateur —</option>`;
    return;
  }

  model.enfants.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.avatar || "👤"} ${e.nom || ""}</option>`;
  });

  // Restaure le dernier user choisi si possible
  const saved = getSavedUserId();
  if(saved && model.enfants.some(e => String(e.id) === String(saved))){
    sel.value = saved;
  }

  // Sauvegarde au changement + re-render
  sel.onchange = () => {
    const id = getSelectedUserId();
    saveUserId(id);
    renderProps();
    renderCal();
  };

  // Sauvegarde aussi au chargement (cas où le premier est auto-sélectionné)
  saveUserId(getSelectedUserId());
}


/* ================= ADD ================= */
async function add(){
  const titre = document.getElementById("titre").value.trim();
  const prix  = document.getElementById("prix").value.trim();
  const lien  = document.getElementById("lien").value.trim();
  const userId = getSelectedUserId();

  if(!titre) return;

  if(!userId){
    alert("Choisis d’abord qui tu es (menu 👤).");
    return;
  }

  const res = await apiPOST({
    action:"addProp",
    titre,
    prix,
    lien,
    userId
  });

  if(!res || !res.ok){
    alert(res?.error || "Erreur ajout");
    return;
  }

  document.getElementById("titre").value="";
  document.getElementById("prix").value="";
  document.getElementById("lien").value="";

  loadFromAPI();
}

/* ================= VOTE ================= */
async function vote(id){
  const userId = getSelectedUserId();

  if(!userId){
    alert("Choisis d’abord qui tu es (menu 👤) avant de voter.");
    return;
  }

  const res = await apiPOST({
    action:"vote",
    id,
    userId
  });

  if(!res || !res.ok){
    alert(res?.error || "Erreur vote");
    return;
  }

  loadFromAPI();
}

/* ================= PROPS ================= */

function renderProps(){
  const p = document.getElementById("props");
  p.innerHTML = "";

  const byId = new Map();
  (model.enfants || []).forEach(e => byId.set(String(e.id), e));

  (model.propositions || []).forEach(x=>{
    const author = byId.get(String(x.userId || ""));
    const who = author ? `${author.avatar || "👤"} ${escapeHtml(author.nom || "")}` : "—";

    p.innerHTML += `
      <div class="prop">
        <b>📌 ${escapeHtml(x.titre || "")}</b><br>
        <span style="opacity:.8">🌀 Proposé par : ${who}</span><br>
        💰 ${escapeHtml(x.prix || "-")}<br>
        ${x.lien ? `<a href="${x.lien}" target="_blank" rel="noopener">voir</a><br>` : ""}

        <div class="vote">
          👍 ${x.votes || 0}
          <button onclick="vote('${x.id}')">+1</button>
        </div>
      </div>
    `;
  });
}

/* ================= CAL ================= */

function renderCal(){
  const c = document.getElementById("cal");
  c.innerHTML = "";

  const local = getLocalCal();

  (model.calendrier || [])
    // IMPORTANT : on retire ton filter(!x.userId) qui pouvait masquer tous les jours
    .slice(0,14)
    .forEach(day=>{
      const dateLabel = day.dateLabel || day.updatedAt || day.dateKey || "";
      // Valeurs remote (si l'API renvoie déjà des slots)
      const remote1 = getDayRemoteSlot(day, 1);
      const remote2 = getDayRemoteSlot(day, 2);

      // Valeurs locales (prioritaires si définies)
      const localDay = local[dateLabel] || {};
      const v1 = localDay.slot1 ?? remote1 ?? "";
      const v2 = localDay.slot2 ?? remote2 ?? "";

      c.innerHTML += `
        <div class="day">
         <b>📅 ${formatDateFR(dateLabel)}</b>
         <div class="options">
  <div>
    <span style="font-size:12px;opacity:.6">Option 1</span>
    <select onchange="saveCal('${escapeHtml(dateLabel)}', 1, this.value)">
      ${buildPropOptions(v1)}
    </select>
  </div>

  <div>
    <span style="font-size:12px;opacity:.6">Option 2</span>
    <select onchange="saveCal('${escapeHtml(dateLabel)}', 2, this.value)">
      ${buildPropOptions(v2)}
    </select>
  </div>
</div>
      `;
    });
}


/* ================= NAV ================= */
function goBack(){
  window.location.href = "./index.html";
}

/* ================= SECURITY ================= */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[ch]));
}

/* ================= INIT ================= */
window.onload = loadFromAPI;

</script>

</body>
</html>
