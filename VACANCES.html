<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

/* 🌈 FOND PLUS CLAIR */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(700px 500px at 10% 0%, rgba(255,255,255,.2), transparent),
    radial-gradient(700px 500px at 90% 0%, rgba(255,255,255,.2), transparent),
    linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  box-sizing:border-box;
  z-index:10;

  padding:12px 26px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin-right:6px;
  padding:92px 16px 16px;
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,.85);
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* GRID ALIGNEMENT */
.row{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  min-width:0;
}

/* INPUT */
select,input{
  height:48px;
  width:100%;
  padding:0 12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  box-sizing:border-box;
}

/* ✅ Menu déroulant utilisateur plus court */
#user{
  max-width:340px;
}

/* Si tu veux l'aligner à gauche tout en restant "court" */
.card label + #user{
  display:block;
}

/* ✅ En mobile très étroit : prix/lien passent en colonne proprement */
@media (max-width: 380px){
  .row{
    flex-wrap:wrap;
  }
  .row .col{
    flex-basis:100%;
  }
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* ✅ CALENDRIER */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day{
  background:white;
  border-radius:12px;
  padding:10px;
}

.day b{
  font-size:16px;
}

.options{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.options select{
  height:38px;
  font-size:15px;
}

/* ✅ PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:12px;
  padding:10px;
  margin-top:8px;
}

.vote{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:6px;
}

.vote button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

  <div class="card">
    <label>👤 Qui es-tu</label>
    <select id="user"></select>
  </div>

  <div class="card">
    
<b onclick="toggleCal()" style="cursor:pointer;">
  🌴 Vacances ⬇
</b>

    <div id="cal" class="calendar" style="display:none;"></div>
  </div>

  <div class="card">

    <div class="row">
      <div class="col">
        <input id="titre" placeholder="Karting 🏎 / Escape 🔐">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <input id="prix" placeholder="Prix">
      </div>
      <div class="col">
        <input id="lien" placeholder="Lien">
      </div>
    </div>

    <button class="primary" onclick="add()">➕ Ajouter</button>

    <b>🔥 Idées proposées</b>
    <div id="props"></div>

  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzUKrmzXep1WFNasSbZcQvYpfmybypxWwS_GAecMYPRE0_f0ipQRfT7j9xNZtiZs0ED/exec";

/* ================= CAL (toggle) ================= */
let calVisible = false;

function toggleCal(){
  const cal = document.getElementById("cal");

  calVisible = !calVisible;
  cal.style.display = calVisible ? "grid" : "none";

  const title = document.querySelector(".card b");
  title.innerHTML = calVisible ? "🌴 Vacances ⬆" : "🌴 Vacances ⬇";
}

/* ================= MODEL ================= */
let model = {
  enfants: [],
  propositions: [],
  calendrier: []
};

/* ================= API ================= */
function jsonpCall(params){
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now();
    params.callback = cb;

    const url = API_URL + "?" + new URLSearchParams(params);

    const s = document.createElement("script");
    s.src = url;

    window[cb] = (data)=>{
      delete window[cb];
      s.remove();
      resolve(data);
    };

    s.onerror = ()=>reject("erreur API");

    document.body.appendChild(s);
  });
}

async function apiGET(action){
  return await jsonpCall({ action });
}

async function apiPOST(payload){
  return await jsonpCall(payload);
}

/* ================= LOAD ================= */
async function loadFromAPI(){
  const res = await apiGET("getAll");

  if(!res || !res.ok){
    alert(res?.error || "Erreur API");
    return;
  }

  const data = res.data || {};

  model.enfants = data.enfants || [];
  model.propositions = data.propositions || [];
  model.calendrier = data.calendrier || [];

  fillUsers();
  renderProps();
  renderCal();
}

/* ================= USERS ================= */
function getSelectedUserId(){
  const sel = document.getElementById("user");
  return sel ? sel.value : "";
}

function fillUsers(){
  const sel = document.getElementById("user");
  sel.innerHTML = "";

  model.enfants.forEach(e=>{
    sel.innerHTML += `<option value="${e.id}">${e.avatar} ${e.nom}</option>`;
  });
}

/* ================= ADD ================= */
async function add(){
  const titre = document.getElementById("titre").value.trim();
  const prix  = document.getElementById("prix").value.trim();
  const lien  = document.getElementById("lien").value.trim();
  const userId = getSelectedUserId();

  if(!titre) return;

  const res = await apiPOST({
    action:"addProp",
    titre,
    prix,
    lien,
    userId
  });

  if(!res || !res.ok){
    alert(res?.error || "Erreur ajout");
    return;
  }

  document.getElementById("titre").value="";
  document.getElementById("prix").value="";
  document.getElementById("lien").value="";

  loadFromAPI();
}

/* ================= VOTE ================= */
async function vote(id){
  const userId = getSelectedUserId();

  const res = await apiPOST({
    action:"vote",
    id,
    userId
  });

  if(!res || !res.ok){
    alert(res?.error || "Erreur vote");
    return;
  }

  loadFromAPI();
}

/* ================= PROPS ================= */
function renderProps(){
  const p = document.getElementById("props");
  p.innerHTML = "";

  model.propositions.forEach(x=>{
    p.innerHTML += `
      <div class="prop">
        <b>🎯 ${escapeHtml(x.titre)}</b><br>
        💰 ${x.prix || "-"}<br>
        ${x.lien ? `<a href="${x.lien}" target="_blank">voir</a><br>` : ""}

        <div class="vote">
          👍 ${x.votes || 0}
          <button onclick="vote('${x.id}')">+1</button>
        </div>
      </div>
    `;
  });
}

/* ================= CAL ================= */
function renderCal(){
  const c = document.getElementById("cal");
  c.innerHTML = "";

  model.calendrier
    .filter(x=>!x.userId)
    .slice(0,14)
    .forEach(day=>{
      c.innerHTML += `
        <div class="day">
          <b>📅 ${day.dateLabel}</b>
        </div>
      `;
    });
}

/* ================= NAV ================= */
function goBack(){
  window.location.href = "./index.html";
}

/* ================= SECURITY ================= */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[ch]));
}

/* ================= INIT ================= */
window.onload = loadFromAPI;

</script>

</body>
</html>
