<!DOCTYPE html>
<html lang="fr">
<head>
<base target="_top">

<style>
body{
  font-family: system-ui;
  margin:0;
  background:linear-gradient(135deg,#F50870,#9C27B0);
  color:white;
}

.wrap{padding:12px}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.btn{
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:bold;
  font-size:16px;
}

.back{background:#000;color:#fff}
.primary{background:#00E5FF;color:#000}

/* CARDS */
.card{
  background:white;
  color:#000;
  border-radius:20px;
  padding:16px;
  margin-bottom:12px;
}

/* INPUT */
select,input{
  width:100%;
  padding:16px;
  font-size:18px;
  border-radius:14px;
  margin-top:8px;
}

/* CALENDRIER */
.day{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.dayTitle{
  font-weight:bold;
  font-size:18px;
}

.slot{
  margin-top:8px;
}

.slot select{
  font-size:16px;
}

/* PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}
</style>

<script>

let model = {
  enfants:[
    {id:'alessia', nom:'Alessia', avatar:'🧋'},
    {id:'antonin', nom:'Antonin', avatar:'🎮'},
    {id:'clement', nom:'Clément', avatar:'🏀'},
    {id:'parents', nom:'Parents', avatar:'😎'}
  ],

  propositions:[
    {id:'1', titre:'Cinéma 🎬', prix:'15'},
    {id:'2', titre:'Piscine 🏊', prix:'5'},
    {id:'3', titre:'Bowling 🎳', prix:'20'}
  ],

  calendrier:[
    {date:'2026-07-01', c1_id:'', c2_id:''},
    {date:'2026-07-02', c1_id:'', c2_id:''},
    {date:'2026-07-03', c1_id:'', c2_id:''}
  ]
};

function byId(id){return document.getElementById(id);}

/******** USERS ********/
function fillUsers(){
  const sel=byId('user');
  sel.innerHTML='';

  model.enfants.forEach(e=>{
    const o=document.createElement('option');
    o.value=e.id;
    o.textContent = e.avatar + " " + e.nom;
    sel.appendChild(o);
  });
}

/******** PROPS ********/
function renderProps(){
  const cont=byId('props');
  cont.innerHTML='';

  model.propositions.forEach(p=>{
    const div=document.createElement('div');
    div.className='prop';
    div.innerHTML=`🎯 ${p.titre} — 💰 ${p.prix}`;
    cont.appendChild(div);
  });
}

/******** CALENDAR ********/
function buildOptions(selected){
  let html='<option value="">-- choisir --</option>';

  model.propositions.forEach(p=>{
    html += `<option value="${p.id}">
      ${p.titre}
    </option>`;
  });

  return html;
}

function renderCalendar(){
  const cont=byId('cal');
  cont.innerHTML='';

  model.calendrier.forEach(day=>{
    const div=document.createElement('div');
    div.className='day';

    div.innerHTML=`
      <div class="dayTitle">📅 ${day.date}</div>

      <div class="slot">
        🌤 Matin
        <select>
          ${buildOptions(day.c1_id)}
        </select>
      </div>

      <div class="slot">
        🌆 Après-midi
        <select>
          ${buildOptions(day.c2_id)}
        </select>
      </div>
    `;

    cont.appendChild(div);
  });
}

/******** ADD ********/
function add(){
  const titre=byId('titre').value;
  const prix=byId('prix').value;

  if(!titre) return;

  model.propositions.push({
    id:Date.now(),
    titre,
    prix
  });

  renderProps();
  renderCalendar();
}

/******** LOAD ********/
function load(){
  fillUsers();
  renderProps();
  renderCalendar();
}

window.onload=load;

function goBack(){
  window.location.href='?page=index';
}
</script>

</head>

<body>

<div class="wrap">

<div class="topbar">
  <button class="btn back" onclick="goBack()">⬅ Retour</button>
  <button class="btn primary">☀️ Vacances</button>
</div>

<div class="card">
  <h2>👤 Qui es-tu ?</h2>
  <select id="user"></select>
</div>

<div class="card">
  <h2>📅 Planning</h2>
  <div id="cal"></div>
</div>

<div class="card">
  <h2>💡 Proposer une idée</h2>

  <input id="titre" placeholder="ex: Escape game 🔐">
  <input id="prix" placeholder="prix">

  <button class="btn primary" onclick="add()">Ajouter</button>

  <h3>🔥 Idées</h3>
  <div id="props"></div>
</div>

</div>

</body>
</html>
