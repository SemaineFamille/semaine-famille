<!DOCTYPE html>
<html lang="fr">
<head>
<base target="_top">

<style>
body{
  font-family:system-ui;
  margin:0;
  background:linear-gradient(135deg,#7b1fa2,#f06292);
  color:white;
  font-size:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  padding:12px;
}
.btn{
  border:none;
  border-radius:16px;
  padding:14px 16px;
  font-size:18px;
  font-weight:bold;
}
.back{background:#000;color:white}

.wrap{padding:10px;}

.card{
  background:white;
  color:black;
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
}

/* INPUT */
select,input{
  width:100%;
  padding:16px;
  font-size:20px;
  border-radius:14px;
  margin-top:10px;
}

/* CALENDRIER */
.calendar{
  display:grid;
  grid-template-columns:repeat(2,1fr); /* 2 colonnes mobile */
  gap:10px;
}

.day{
  background:white;
  color:black;
  border-radius:18px;
  padding:12px;
  text-align:center;
}

.dayTitle{
  font-weight:bold;
  font-size:18px;
  margin-bottom:8px;
}

select{
  font-size:16px;
}

/* PROPOSITIONS */
.prop{
  background:#f3e5f5;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}
</style>

<script>

let model={
  enfants:[
    {id:'alessia',nom:'Alessia',avatar:'🧋'},
    {id:'antonin',nom:'Antonin',avatar:'📷'},
    {id:'clement',nom:'Clément',avatar:'🚴‍♂️'},
    {id:'diego',nom:'Diego',avatar:'⚽'},
    {id:'jeremie',nom:'Jérémie',avatar:'🏑'},
    {id:'yann',nom:'Yann',avatar:'🧔'},
    {id:'melanie',nom:'Mélanie',avatar:'🌸'}
  ],

  propositions:[
    {id:'1',titre:'Cinéma 🎬'},
    {id:'2',titre:'Piscine 🏊'},
    {id:'3',titre:'Bowling 🎳'}
  ],

  calendrier:[]
};

/******** INIT CALENDRIER ********/
function generateCalendar(){
  const start=new Date();
  for(let i=0;i<10;i++){ // 10 jours exemple
    let d=new Date(start);
    d.setDate(d.getDate()+i);

    model.calendrier.push({
      date:d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}),
      c1:'',
      c2:''
    });
  }
}

/******** USERS ********/
function fillUsers(){
  const sel=document.getElementById('user');
  sel.innerHTML='';

  model.enfants.forEach(e=>{
    const o=document.createElement('option');
    o.value=e.id;
    o.textContent=e.avatar+" "+e.nom;
    sel.appendChild(o);
  });
}

/******** PROPS ********/
function renderProps(){
  const cont=document.getElementById('props');
  cont.innerHTML='';

  model.propositions.forEach(p=>{
    const div=document.createElement('div');
    div.className='prop';
    div.innerHTML="🎯 "+p.titre;
    cont.appendChild(div);
  });
}

/******** CALENDAR ********/
function buildOptions(selected){
  let html=`<option value="">--</option>`;
  model.propositions.forEach(p=>{
    html+=`<option>${p.titre}</option>`;
  });
  return html;
}

function renderCalendar(){
  const cont=document.getElementById('cal');
  cont.innerHTML='';

  model.calendrier.forEach(day=>{
    const div=document.createElement('div');
    div.className='day';

    div.innerHTML=`
      <div class="dayTitle">📅 ${day.date}</div>

      <div>
        🌤
        <select>${buildOptions(day.c1)}</select>
      </div>

      <div>
        🌆
        <select>${buildOptions(day.c2)}</select>
      </div>
    `;

    cont.appendChild(div);
  });
}

/******** ADD ********/
function add(){
  const titre=document.getElementById('titre').value;
  if(!titre) return;

  model.propositions.push({
    id:Date.now(),
    titre:titre
  });

  renderProps();
  renderCalendar();
}

/******** LOAD ********/
function load(){
  generateCalendar();
  fillUsers();
  renderProps();
  renderCalendar();
}

window.onload=load;

function goBack(){
  window.location.href='?page=index';
}
</script>

</head>

<body>

<div class="topbar">
  <button class="btn back" onclick="goBack()">⬅Retour</button>
</div>

<div class="wrap">

<div class="card">
  <h2>👤 Qui es-tu ?</h2>
  <select id="user"></select>
</div>

<div class="card">
  <h2>🌴 Calendrier vacances</h2>
  <div id="cal" class="calendar"></div>
</div>

<div class="card">
  <h2>💡 Ajouter une idée</h2>

  <input id="titre" placeholder="Escape game 🔐 / Karting 🏎">

  <button class="btn" style="background:#00E5FF;color:black" onclick="add()">Ajouter</button>

  <h3>🔥 Idées proposées</h3>
  <div id="props"></div>
</div>

</div>

</body>
</html>
