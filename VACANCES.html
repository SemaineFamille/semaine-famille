<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);
  background:linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:12px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px;
  border-radius:14px;
  color:white;
}

.wrap{
  padding:90px 16px;
}

.card{
  background:white;
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

select,input{
  width:100%;
  padding:10px;
  margin-top:6px;
}

button{
  margin-top:10px;
}

.prop{
  background:#f3e5f5;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

<div class="card">
<label>👤 Qui es-tu</label>
<select id="user"></select>
</div>

<div class="card">
<input id="titre" placeholder="Idée">
<input id="prix" placeholder="Prix">
<input id="lien" placeholder="Lien">
<button onclick="add()">Ajouter</button>

<div id="props"></div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbzUKrmzXep1WFNasSbZcQvYpfmybypxWwS_GAecMYPRE0_f0ipQRfT7j9xNZtiZs0ED/exec";

let model={enfants:[],propositions:[]};

/* API */
async function apiGET(){
  const r=await fetch(API_URL+"?action=getAll");
  return await r.json();
}

async function apiPOST(data){
  const r=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify(data)
  });
  return await r.json();
}

/* LOAD */
async function load(){
  const res=await apiGET();
  model=res.data;
  fillUsers();
  render();
}

/* USERS */
function fillUsers(){
  const s=document.getElementById("user");
  s.innerHTML="";
  model.enfants.forEach(e=>{
    s.innerHTML+=`<option value="${e.id}">${e.nom}</option>`;
  });
}

function getUser(){
  return document.getElementById("user").value;
}

/* ADD */
async function add(){
  const titre=document.getElementById("titre").value;
  const userId=getUser();

  const res=await apiPOST({
    action:"addProp",
    titre,
    userId
  });

  if(!res.ok){alert(res.error);return;}

  load();
}

/* VOTE (1 seul) */
async function vote(id){
  const userId=getUser();

  const res=await apiPOST({
    action:"vote",
    id,
    userId
  });

  if(!res.ok){
    alert(res.error); // message "déjà voté"
    return;
  }

  load();
}

/* RENDER */
function render(){
  const p=document.getElementById("props");
  p.innerHTML="";

  model.propositions.forEach(x=>{
    p.innerHTML+=`
      <div class="prop">
        <b>${escapeHtml(x.titre)}</b><br>
        👤 ${escapeHtml(x.auteur || "")}<br>
        👍 ${x.votes || 0}
        <button onclick="vote('${x.id}')">+1</button>
      </div>
    `;
  });
}

/* NAV */
function goBack(){
  window.location.href="https://semainefamille.github.io/index.html";
}

/* SECURITY */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch=>{
    return {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[ch];
  });
}

window.onload=load;
</script>

</body>
</html>
