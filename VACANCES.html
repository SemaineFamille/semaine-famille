<!DOCTYPE html>
<html lang="fr">
<head>
  <base target="_top">

<style>
body{
  font-family:system-ui;
  background:#f6f3fb;
  margin:0;
  font-size:18px;
}

.wrap{padding:12px;}

h1{font-size:24px;text-align:center;}
h2{font-size:20px;color:#6a1b9a}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:flex-end;
  padding:10px;
}
.btn{
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:18px;
  width:100%;
  margin-top:8px;
}
.btn.back{background:#673ab7;color:#fff}
.btn.primary{background:#F50870;color:#fff}
.btn.small{width:auto;padding:10px 12px}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

/* INPUT */
select,input,textarea{
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:12px;
  border:2px solid #ddd;
}

/* LISTE */
.item{
  background:#f3e5f5;
  border-radius:16px;
  padding:12px;
  margin-bottom:10px;
}
.avatar{font-size:26px}
.meta{font-weight:900}

/* CALENDRIER */
.day{
  background:#f3e5f5;
  border-radius:16px;
  padding:12px;
  margin-bottom:10px;
}
.dnum{font-weight:bold;margin-bottom:8px}

.slots{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.slot{
  background:#fff;
  padding:10px;
  border-radius:12px;
}

</style>

<script>

let model=null;

// ✅ fallback si serveur ne renvoie rien
const fallbackEnfants = [
  {id:'alessia', nom:'Alessia', avatar:'👧'},
  {id:'antonin', nom:'Antonin', avatar:'👦'},
  {id:'clement', nom:'Clément', avatar:'👦'},
  {id:'parents', nom:'Parents', avatar:'👨‍👩‍👧'}
];

function byId(id){return document.getElementById(id);}

function fillUsers(){
  const sel = byId('user');

  const enfants = (model && model.enfants && model.enfants.length)
    ? model.enfants
    : fallbackEnfants;

  sel.innerHTML='';
  
  enfants.forEach(e=>{
    const o=document.createElement('option');
    o.value=e.id;
    o.textContent=e.avatar+" "+e.nom;
    sel.appendChild(o);
  });

  sel.selectedIndex=0;
}

function goBack(){
  window.location.href='?page=index';
}

/************** PROPOSITIONS **************/
function renderProps(){
  const cont=byId('props');
  cont.innerHTML='';

  if(!model.propositions.length){
    cont.innerHTML='Aucune proposition';
    return;
  }

  model.propositions.forEach(p=>{
    const div=document.createElement('div');
    div.className='item';

    div.innerHTML=`
      <div class="avatar">${p.auteurNom || ''}</div>
      <div class="meta">${p.titre}</div>
      <div>💰 ${p.prix || '—'}</div>
      ${p.lien ? `<a href="${p.lien}" target="_blank">🔗 lien</a>` : ''}
    `;

    cont.appendChild(div);
  });
}

/************** CALENDRIER **************/
function buildOptions(selected){
  let html=`<option value="">--</option>`;
  model.propositions.forEach(p=>{
    html+=`<option value="${p.id}" ${p.id==selected?'selected':''}>
      ${p.titre}
    </option>`;
  });
  return html;
}

function renderCalendar(){
  const cont=byId('cal');
  cont.innerHTML='';

  model.calendrier.forEach(day=>{

    const div=document.createElement('div');
    div.className='day';

    div.innerHTML=`
      <div class="dnum">${day.date}</div>

      <div class="slots">
        <div class="slot">
          <select onchange="save('${day.date}',1,this.value)">
            ${buildOptions(day.c1_id)}
          </select>
        </div>

        <div class="slot">
          <select onchange="save('${day.date}',2,this.value)">
            ${buildOptions(day.c2_id)}
          </select>
        </div>
      </div>
    `;

    cont.appendChild(div);
  });
}

function save(date,slot,val){
  google.script.run.setCalendarChoice(date,slot,val,'',byId('user').value);
}

/************** LOAD **************/
function load(){
  google.script.run.withSuccessHandler(m=>{
    model=m;

    fillUsers();
    renderProps();
    renderCalendar();

  }).getModel();
}

window.onload=load;

</script>
</head>

<body>

<div class="topbar">
  <button class="btn back" onclick="goBack()">⬅ Retour</button>
</div>

<div class="wrap">

<h1>Vacances</h1>

<div class="card">
  <label>Qui es-tu ?</label>
  <select id="user"></select>
</div>

<div class="card">
  <h2>📅 Calendrier</h2>
  <div id="cal"></div>
</div>

<div class="card">
  <h2>💡 Propositions</h2>

  <input id="titre" placeholder="activité">
  <input id="prix" placeholder="prix">
  <input id="lien" placeholder="lien">

  <button class="btn primary" onclick="add()">Ajouter</button>

  <div id="props"></div>
</div>

</div>

<script>
function add(){
  google.script.run
    .withSuccessHandler(load)
    .addProposition(
      byId('user').value,
      byId('titre').value,
      byId('prix').value,
      byId('lien').value
    );
}
</script>

</body>
</html>
