
<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CFF</title>

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
  --muted:rgba(255,255,255,.7);
}

body{
  margin:0;
  font-family:sans-serif;
  color:var(--txt);

  background:
    radial-gradient(800px 500px at 10% 0%, rgba(245,8,112,.35), transparent),
    radial-gradient(800px 500px at 100% 0%, rgba(156,39,176,.35), transparent),
    linear-gradient(180deg,#120516,#1b0830);
}

.wrap{max-width:700px;margin:auto;padding:16px;}

.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
  backdrop-filter:blur(10px);
}

select,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,6,34,.8);
  color:white;
}

.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.kpi div{font-size:13px;}
.kpi b{font-size:18px;}

.progress{
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  margin-top:12px;
  overflow:hidden;
}

#bar{
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#F50870,#9C27B0);
}

.list{margin-top:10px;}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,.25);
  margin-top:6px;
}

.del{
  background:linear-gradient(135deg,#ff4d6d,#F50870);
  border:none;
  padding:6px 10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.bigbtn{
  width:100%;
  margin-top:10px;
  font-size:15px;
  letter-spacing:0.5px;
}

/* bouton style propre */
.btn{
  border:none;
  padding:12px 14px;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  transition: all .15s ease;
}

/* bouton principal rose */
.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  box-shadow:0 6px 18px rgba(245,8,112,.25);
}

/* hover */
.primary:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(245,8,112,.35);
}

/* clic */
.primary:active{
  transform:scale(.97);
}


  
</style>
</head>

<body>
<body>
  <div class="topbar">
    <div class="title">
    
    </div>
    <button class="btn" onclick="location.href='index.html'">⬅ Retour</button>
  </div>



<div class="wrap">

<div class="card">
  <label>Personne</label>
  <select id="pers"></select>

  <label>Montant billet</label>
  <input type="number" id="montant">

  
<button class="btn primary bigbtn" onclick="add()">
  ➕ Ajouter trajet
</button>

  <div class="kpi">
    <div>Total<br><b id="total">0</b></div>
    <div>Reste<br><b id="reste">0</b></div>
    <div>Abonnement<br><b id="prix">0</b></div>
  </div>

  <div class="progress"><div id="bar"></div></div>

</div>

<div class="card">
  <b>Historique</b>
  <div id="list" class="list"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxOJEus1Fev5I4YZsSbjpIXXlgGJBY7QmFkkqZtkXYD6eEPwqmgCl8r2hfrO1X9eyqxSA/exec";

const USERS={
  jeremie:{label:"Jérémie", prix:120},
  antonin:{label:"Antonin", prix:120},
  yann:{label:"Yann", prix:170},
  melanie:{label:"Mélanie", prix:170}
};

let trips=[];

// ✅ dropdown propre
function initUsers(){
  const sel=document.getElementById("pers");

  sel.innerHTML=Object.entries(USERS)
    .map(([k,v])=>`<option value="${k}">${v.label}</option>`)
    .join("");

  sel.onchange=load;
}

// ✅ charger historique
async function load(){
  const p=document.getElementById("pers").value;

  const text=await fetch(API+"?sheet=CFF&action=lire&personne="+p)
    .then(r=>r.text());

  trips=[];
  const list=document.getElementById("list");
  list.innerHTML="";

  if(text){
    text.split("~~~~").forEach(l=>{
      const [date,pers,m,row]=l.split("|");
      const montant=parseFloat(m);

      if(!date || !montant) return;

      trips.push({date,pers,montant,row});

      list.innerHTML+=`
        <div class="item">
          <div>
            ${montant.toFixed(2)} CHF<br>
            <small>${date}</small>
          </div>
          <div>
            ${USERS[pers].label}
            <button class="del" onclick="del(${row})">🗑️</button>
          </div>
        </div>`;
    });
  }

  compute();
}

// ✅ calcul + progression
function compute(){
  const p=document.getElementById("pers").value;
  const prix=USERS[p].prix;

  let total=0;
  trips.forEach(t=>total+=t.montant);

  const reste=prix-total;

  document.getElementById("total").textContent=total.toFixed(2)+" CHF";
  document.getElementById("prix").textContent=prix+" CHF";

  document.getElementById("reste").textContent=
    reste>0 ? reste.toFixed(2)+" CHF" : "✅ Abonnement rentable";

  const percent=Math.min(100,(total/prix)*100);
  document.getElementById("bar").style.width=percent+"%";
}

// ✅ ajout
async function add(){
  const p=document.getElementById("pers").value;
  const montant=document.getElementById("montant").value;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"ajouter",
      personne:p,
      montant
    })
  });

  load();
}

// ✅ suppression
async function del(row){
  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"supprimer",
      row
    })
  });

  load();
}

// INIT
initUsers();
load();
</script>

</body>
</html>
