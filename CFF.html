
<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CFF</title>

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --accentViolet:#7B1FA2;
  --txt:#fff;
  --muted:rgba(255,255,255,.7);
}

/* 🌈 BACKGROUND */
body{
  margin:0;
  font-family:sans-serif;
  color:var(--txt);

  background:
    radial-gradient(800px 500px at 10% 0%, rgba(245,8,112,.35), transparent),
    radial-gradient(800px 500px at 100% 0%, rgba(156,39,176,.35), transparent),
    linear-gradient(180deg,#120516,#1b0830);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:12px 16px;   /* ✅ espace à droite ajouté */
  box-sizing:border-box; /* ✅ très important */
  z-index:10;
}


/* BOUTONS */
.btn{
  border:none;
  padding:12px 14px;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  transition:all .15s ease;
}

.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 8px 24px rgba(245,8,112,.35);
  color:white;
}

.primary:hover{
  transform:translateY(-2px);
}

.primary:active{
  transform:scale(.96);
}

/* bouton retour */
.backbtn{
  background:linear-gradient(135deg,#7B1FA2,#9C27B0);
  box-shadow:0 6px 18px rgba(156,39,176,.35);
  color:white;
}

.backbtn:hover{
  transform:translateY(-2px);
}

.backbtn:active{
  transform:scale(.96);
}

/* LAYOUT */
.wrap{
  max-width:700px;
  margin:auto;
  padding:70px 16px 16px; /* espace pour header */
}

.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
  backdrop-filter:blur(10px);
}

/* INPUT */
select,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,6,34,.8);
  color:white;
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.kpi div{font-size:13px;}
.kpi b{font-size:18px;}

/* PROGRESS */
.progress{
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  margin-top:12px;
  overflow:hidden;
}

#bar{
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#F50870,#9C27B0);
}

/* LIST */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,.25);
  margin-top:6px;
}

/* bouton suppression */
.del{
  background:linear-gradient(135deg,#ff4d6d,#F50870);
  border:none;
  padding:6px 10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="btn backbtn" onclick="location.href='index.html'">
    ⬅ Retour
  </button>
</div>

<div class="wrap">

<div class="card">
  <label>Personne</label>
  <select id="pers"></select>

  <label>Montant billet</label>
  <input type="number" id="montant">

  <button class="btn primary" onclick="add()">➕ Ajouter trajet</button>

  <div class="kpi">
    <div>Total<br><b id="total">0</b></div>
    <div>Reste<br><b id="reste">0</b></div>
    <div>Abonnement<br><b id="prix">0</b></div>
  </div>

  <div class="progress"><div id="bar"></div></div>
</div>

<div class="card">
  <b>Historique</b>
  <div id="list"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxOJEus1Fev5I4YZsSbjpIXXlgGJBY7QmFkkqZtkXYD6eEPwqmgCl8r2hfrO1X9eyqxSA/exec";

const USERS={
  jeremie:{label:"Jérémie",prix:120},
  antonin:{label:"Antonin",prix:120},
  yann:{label:"Yann",prix:170},
  melanie:{label:"Mélanie",prix:170}
};

let trips=[];

/* ✅ init users */
function init(){
  const sel=document.getElementById("pers");

  sel.innerHTML=Object.entries(USERS)
    .map(([k,v])=>`<option value="${k}">${v.label}</option>`)
    .join("");

  const last=localStorage.getItem("cff_person") || "jeremie";
  sel.value=USERS[last] ? last : "jeremie";

  sel.onchange=()=>{
    localStorage.setItem("cff_person",sel.value);
    load();
  };

  load();
}

/* ✅ load */
async function load(){
  const p=document.getElementById("pers").value;

  const text=await fetch(API+"?sheet=CFF&action=lire&personne="+p).then(r=>r.text());

  trips=[];
  const list=document.getElementById("list");
  list.innerHTML="";

  if(text){
    text.split("~~~~").forEach(l=>{
      const [date,pers,m,row]=l.split("|");
      const montant=parseFloat(m);

      if(!date || !montant) return;

      trips.push({date,pers,montant,row});

      list.innerHTML+=`
      <div class="item">
        <div>
          ${montant.toFixed(2)} CHF<br>
          <small>${date}</small>
        </div>
        <div>
          ${USERS[pers]?.label || pers}
          <button class="del" onclick="del(${row})">🗑️</button>
        </div>
      </div>`;
    });
  }

  compute();
}

/* ✅ compute */
function compute(){
  const p=document.getElementById("pers").value;
  const prix=USERS[p].prix;

  let total=0;
  trips.forEach(t=>total+=t.montant);

  const reste=prix-total;

  document.getElementById("total").textContent=total.toFixed(2)+" CHF";
  document.getElementById("prix").textContent=prix+" CHF";

  document.getElementById("reste").textContent=
    reste>0 ? reste.toFixed(2)+" CHF" : "✅ Rentabilisé";

  const percent=Math.min(100,(total/prix)*100);
  document.getElementById("bar").style.width=percent+"%";
}

/* ✅ add */
async function add(){
  const p=document.getElementById("pers").value;
  const montant=document.getElementById("montant").value;

  if(!montant) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"ajouter",
      personne:p,
      montant
    })
  });

  document.getElementById("montant").value="";
  load();
}

/* ✅ delete */
async function del(row){
  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"supprimer",
      row
    })
  });

  load();
}

init();
</script>

</body>
</html>
