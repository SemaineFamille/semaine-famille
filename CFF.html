<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFF</title>

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --violet:#7B1FA2;
  --txt:#fff;
  --muted:rgba(255,255,255,.7);
}

/* 🌈 FOND */
body{
  margin:0;
  font-family:system-ui,sans-serif;
  color:var(--txt);

  background:
    radial-gradient(900px 600px at 10% 0%, rgba(245,8,112,.4), transparent),
    radial-gradient(900px 600px at 90% 0%, rgba(156,39,176,.4), transparent),
    linear-gradient(180deg,#120516,#1b0830);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:12px 18px;
  box-sizing:border-box;
  z-index:10;
}

.backbtn{
  background:linear-gradient(135deg,var(--violet),#9C27B0);
  border:none;
  padding:10px 14px;
  border-radius:14px;
  font-weight:900;
  color:white;
  cursor:pointer;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin:auto;
  padding:70px 16px 16px;
}

.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
}

/* ✅ ALIGNEMENT PARFAIT */
.row{
  display:flex;
  gap:12px;
}

.col{
  flex:1;
}

/* ✅ EXACT MÊME TAILLE */
select, input{
  height:42px;
  width:100%;
  padding:0 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,6,34,.8);
  color:white;
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  border:none;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* DATE */
.date{
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}
.kpi b{font-size:18px;}

/* PROGRESS */
.progress{
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  margin-top:10px;
}
#bar{
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#F50870,#9C27B0);
}

/* LIST */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,.25);
  margin-top:6px;
}

.del{
  background:linear-gradient(135deg,#ff4d6d,#F50870);
  border:none;
  padding:6px 10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="location.href='index.html'">⬅ Retour</button>
</div>

<div class="wrap">

<div class="card">

<div class="row">
  <div class="col">
    <label>Personne</label>
    <select id="pers"></select>
  </div>

  <div class="col">
    <label>Montant billet</label>
    <input type="number" id="montant">
  </div>
</div>

<button class="primary" onclick="add()">➕ Ajouter trajet</button>

<div class="date">
  Abonnement depuis : <b id="dateDebut">—</b>
</div>

<div class="kpi">
  <div>Total<br><b id="total">0</b></div>
  <div>Reste<br><b id="reste">0</b></div>
  <div>Prix<br><b id="prix">0</b></div>
</div>

<div class="progress"><div id="bar"></div></div>

</div>

<div class="card">
  <b>Historique</b>
  <div id="list"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxOJEus1Fev5I4YZsSbjpIXXlgGJBY7QmFkkqZtkXYD6eEPwqmgCl8r2hfrO1X9eyqxSA/exec";

const USERS={
  jeremie:"Jérémie",
  antonin:"Antonin",
  yann:"Yann",
  melanie:"Mélanie"
};

let trips=[];
let config={};

function init(){
  const sel=document.getElementById("pers");

  sel.innerHTML=Object.entries(USERS)
    .map(([k,v])=>`<option value="${k}">${v}</option>`)
    .join("");

  const last=localStorage.getItem("cff_person")||"jeremie";
  sel.value=USERS[last]?last:"jeremie";

  sel.onchange=()=>{
    localStorage.setItem("cff_person",sel.value);
    load();
  };

  load();
}

/* ✅ charge config google sheet */
async function loadConfig(){
  const txt=await fetch(API+"?sheet=CFF_CONFIG&action=lire").then(r=>r.text());

  config={};

  if(txt){
    txt.split("~~~~").forEach(l=>{
      const [pers,date,prix]=l.split("|");
      config[pers.trim()]={date,prix:parseFloat(prix)};
    });
  }
}

async function load(){
  await loadConfig();

  const p=document.getElementById("pers").value;

  const cfg=config[p];
  document.getElementById("dateDebut").textContent=cfg?.date || "—";

  const text=await fetch(API+"?sheet=CFF&action=lire&personne="+p).then(r=>r.text());

  trips=[];
  const list=document.getElementById("list");
  list.innerHTML="";

  if(text){
    text.split("~~~~").forEach(l=>{
      const [date,pers,m,row]=l.split("|");
      const montant=parseFloat(m);

      if(!date||!montant)return;

      trips.push({date,pers,montant,row});

      list.innerHTML+=`
      <div class="item">
        <div>${montant.toFixed(2)} CHF<br><small>${date}</small></div>
        <div>
          ${USERS[pers]}
          <button class="del" onclick="del(${row})">🗑️</button>
        </div>
      </div>`;
    });
  }

  compute();
}

/* ✅ calcul corrigé */
function compute(){
  const p=document.getElementById("pers").value;
  const prix=config[p]?.prix || 0;

  let total=0;
  trips.forEach(t=>total+=t.montant);

  const reste=prix-total;

  document.getElementById("total").textContent=total.toFixed(2)+" CHF";
  document.getElementById("prix").textContent=prix+" CHF";

  document.getElementById("reste").textContent=
    reste>0 ? reste.toFixed(2)+" CHF" : "✅ Rentabilisé";

  const percent=Math.min(100,(total/prix)*100);
  document.getElementById("bar").style.width=percent+"%";
}

/* CRUD */
async function add(){
  const p=document.getElementById("pers").value;
  const m=document.getElementById("montant").value;

  if(!m)return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({sheet:"CFF",action:"ajouter",personne:p,montant:m})
  });

  document.getElementById("montant").value="";
  load();
}

async function del(row){
  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({sheet:"CFF",action:"supprimer",row})
  });

  load();
}

init();
</script>

</body>
</html>
