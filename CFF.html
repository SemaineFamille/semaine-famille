<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFF</title>

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --violet:#7B1FA2;
  --txt:#fff;
  --muted:rgba(255,255,255,.7);
}

/* 🌈 FOND */
body{
  margin:0;
  font-family:system-ui,sans-serif;
  color:var(--txt);

  background:
    radial-gradient(900px 600px at 10% 0%, rgba(245,8,112,.4), transparent),
    radial-gradient(900px 600px at 90% 0%, rgba(156,39,176,.4), transparent),
    linear-gradient(180deg,#120516,#1b0830);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  padding:12px 18px;
  box-sizing:border-box;
  z-index:10;
}

.backbtn{
  background:linear-gradient(135deg,var(--violet),#9C27B0);
  border:none;
  padding:10px 14px;
  border-radius:14px;
  font-weight:900;
  color:white;
  cursor:pointer;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin:auto;
  padding:70px 16px 16px;
}

.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
}

/* ✅ ALIGNEMENT PARFAIT */
.row{
  display:flex;
  gap:12px;
}

.col{
  flex:1;
}

/* ✅ EXACT MÊME TAILLE */
select, input{
  height:42px;
  width:100%;
  padding:0 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,6,34,.8);
  color:white;
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  border:none;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

/* DATE */
.date{
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}
.kpi b{font-size:18px;}

/* PROGRESS */
.progress{
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  margin-top:10px;
}
#bar{
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#F50870,#9C27B0);
}

/* LIST */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,.25);
  margin-top:6px;
}

.del{
  background:linear-gradient(135deg,#ff4d6d,#F50870);
  border:none;
  padding:6px 10px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="backbtn" onclick="location.href='index.html'">⬅ Retour</button>
</div>

<div class="wrap">

<div class="card">

<div class="row">
  <div class="col">
    <label>Personne</label>
    <select id="pers"></select>
  </div>

  <div class="col">
    <label>Montant billet</label>
    <input type="number" id="montant">
  </div>
</div>

<button class="primary" onclick="add()">➕ Ajouter trajet</button>

<div class="date">
  Abonnement depuis : <b id="dateDebut">—</b>
</div>

<div class="kpi">
  <div>Total<br><b id="total">0</b></div>
  <div>Reste<br><b id="reste">0</b></div>
  <div>Prix<br><b id="prix">0</b></div>
</div>

<div class="progress"><div id="bar"></div></div>

</div>

<div class="card">
  <b>Historique</b>
  <div id="list"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxOJEus1Fev5I4YZsSbjpIXXlgGJBY7QmFkkqZtkXYD6eEPwqmgCl8r2hfrO1X9eyqxSA/exec";

const USERS={
  jeremie:"Jérémie",
  antonin:"Antonin",
  yann:"Yann",
  melanie:"Mélanie"
};

let trips=[];
let config={};

// Paramètres abonnement
const SUBSCRIPTION_YEARS = 1;     // valide 1 an
const WARN_DAYS = 30;            // alerte 30 jours avant échéance

/* ----------------- Dates ----------------- */
function todayYMD(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function toYMD(dateStr){
  // Convertit "Sat Aug 09 2025 ..." / "2025-08-09" / "09/08/2025" -> "YYYY-MM-DD"
  if(!dateStr) return "";
  const s = String(dateStr).trim();

  // déjà ISO
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // format fr 09/08/2025 ou 09.08.2025
  const m1 = s.match(/^(\d{2})[\/.](\d{2})[\/.](\d{4})$/);
  if(m1) return `${m1[3]}-${m1[2]}-${m1[1]}`;

  // Date JS parseable
  const d = new Date(s);
  if(!isNaN(d.getTime())){
    const y = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const da = String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${da}`;
  }

  // fallback : on renvoie tel quel (mais risque)
  return s;
}

function formatDateFR(dateStr){
  const ymd = toYMD(dateStr);
  if(!ymd || !/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return "—";
  const d = new Date(ymd + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { day:"2-digit", month:"long", year:"numeric" });
}

function addYearsYMD(ymd, years){
  const d = new Date(ymd + "T00:00:00");
  d.setFullYear(d.getFullYear() + years);
  return d.toISOString().slice(0,10);
}

function daysUntilYMD(futureYmd){
  const now = new Date(todayYMD()+"T00:00:00").getTime();
  const fut = new Date(futureYmd+"T00:00:00").getTime();
  return Math.floor((fut - now) / (24*60*60*1000));
}

/* ----------------- UI helpers ----------------- */
function setDateLabel(text){
  const el = document.getElementById("dateDebut");
  if(el) el.textContent = text;
}

/* ----------------- Config (Google Sheet) ----------------- */
async function loadConfig(){
  const txt = await fetch(API+"?sheet=CFF_CONFIG&action=lire").then(r=>r.text());

  config = {};
  if(txt && txt.trim()){
    txt.split("~~~~").forEach(line=>{
      const parts = line.split("|");
      const pers = (parts[0]||"").trim().toLowerCase();
      const dateRaw = (parts[1]||"").trim();
      const prixRaw = (parts[2]||"").trim();

      if(!pers) return;

      config[pers] = {
        date_raw: dateRaw,
        date: toYMD(dateRaw),                 // ✅ date normalisée ISO
        prix: parseFloat(prixRaw || "0") || 0
      };
    });
  }

  // valeurs par défaut si manquantes (ne casse pas tes données)
  Object.keys(USERS).forEach(p=>{
    if(!config[p]) config[p] = { date_raw:"", date:"", prix:0 };
    if(!config[p].date) config[p].date = "2026-01-01";
    if(!config[p].prix || config[p].prix<=0){
      // tes valeurs usuelles
      config[p].prix = (p==="yann" || p==="melanie") ? 170 : 120;
    }
  });
}

async function saveConfig(personne, date_debut_ymd, prix){
  const body = new URLSearchParams({
    sheet:"CFF_CONFIG",
    action:"enregistrer",
    personne,
    date_debut: date_debut_ymd,
    prix: String(prix)
  });

  const res = await fetch(API, { method:"POST", body }).then(r=>r.text());
  return res.trim();
}

/* ----------------- Renouvellement abonnement ----------------- */
async function checkAndRenewIfNeeded(personne){
  const cfg = config[personne];
  if(!cfg) return;

  const start = cfg.date; // ISO
  const end = addYearsYMD(start, SUBSCRIPTION_YEARS);
  const remaining = daysUntilYMD(end);

  // Alerte bientôt expiré
  if(remaining <= WARN_DAYS && remaining >= 0){
    setDateLabel(`${formatDateFR(start)} (⚠️ expire dans ${remaining} jour${remaining>1?'s':''})`);
  } else {
    setDateLabel(formatDateFR(start));
  }

  // Expiré -> renouvellement + "remise à zéro"
  if(remaining < 0){
    const newStart = todayYMD();
    const res = await saveConfig(personne, newStart, cfg.prix);
    if(res === "ok"){
      cfg.date = newStart;
      cfg.date_raw = newStart;
      setDateLabel(`${formatDateFR(newStart)} (🆕 nouveau cycle)`);
    } else {
      // si échec, on garde l’ancien mais on indique le souci
      setDateLabel(`${formatDateFR(start)} (⚠️ renouvellement impossible)`);
    }
  }
}

/* ----------------- Trips ----------------- */
async function loadTrips(){
  const p = document.getElementById("pers").value;
  const cfg = config[p];

  // On tente de filtrer côté Apps Script via from, MAIS on refiltre côté JS (fiable)
  const from = cfg?.date || "";
  const url = API + `?sheet=CFF&action=lire&personne=${encodeURIComponent(p)}&from=${encodeURIComponent(from)}`;
  const text = await fetch(url).then(r=>r.text());

  trips = [];
  const list = document.getElementById("list");
  list.innerHTML = "";

  if(text && text.trim()){
    text.split("~~~~").forEach(line=>{
      const parts = line.split("|");
      const dateStr = (parts[0]||"").trim();
      const pers = (parts[1]||"").trim().toLowerCase();
      const montant = parseFloat(parts[2]||"");
      const row = parts[3] ? parseInt(parts[3],10) : null;

      if(!dateStr || !pers || !isFinite(montant)) return;

      const tripYMD = toYMD(dateStr);
      const startYMD = cfg.date;

      // ✅ Filtre fiable (remise à zéro logique au renouvellement)
      if(tripYMD && startYMD && tripYMD < startYMD) return;

      trips.push({date: tripYMD || dateStr, pers, montant, row});
    });

    // tri récent -> ancien
    trips.sort((a,b)=> String(b.date).localeCompare(String(a.date)));

    trips.forEach(t=>{
      list.innerHTML += `
        <div class="item">
          <div>${t.montant.toFixed(2)} CHF<br><small>${formatDateFR(t.date)}</small></div>
          <div>
            ${USERS[t.pers] || t.pers}
            ${t.row ? `<button class="del" onclick="del(${t.row})">🗑️</button>` : ``}
          </div>
        </div>`;
    });
  }
}

function compute(){
  const p = document.getElementById("pers").value;
  const prix = config[p]?.prix || 0;

  let total = 0;
  trips.forEach(t=> total += t.montant);

  const reste = prix - total;

  document.getElementById("total").textContent = total.toFixed(2) + " CHF";
  document.getElementById("prix").textContent  = prix + " CHF";
  document.getElementById("reste").textContent =
    (reste > 0 ? reste.toFixed(2) + " CHF" : "✅ Rentabilisé");

  const percent = (prix > 0) ? Math.min(100, (total/prix)*100) : 0;
  document.getElementById("bar").style.width = percent + "%";
}

/* CRUD */
async function add(){
  const p = document.getElementById("pers").value;
  const m = document.getElementById("montant").value;

  if(!m) return;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({sheet:"CFF",action:"ajouter",personne:p,montant:m})
  });

  document.getElementById("montant").value="";
  await refreshAll();
}

async function del(row){
  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({sheet:"CFF",action:"supprimer",row})
  });

  await refreshAll();
}

/* Init UI */
function init(){
  const sel = document.getElementById("pers");

  sel.innerHTML = Object.entries(USERS)
    .map(([k,v])=>`<option value="${k}">${v}</option>`)
    .join("");

  const last = localStorage.getItem("cff_person") || "jeremie";
  sel.value = USERS[last] ? last : "jeremie";

  sel.onchange = async ()=>{
    localStorage.setItem("cff_person", sel.value);
    await refreshAll();
  };

  refreshAll();
}

async function refreshAll(){
  await loadConfig();

  const p = document.getElementById("pers").value;

  // ✅ renouvellement éventuel + alerte
  await checkAndRenewIfNeeded(p);

  // ✅ load trips filtrés + compute
  await loadTrips();
  compute();
}

init();
</script>

</body>
</html>
