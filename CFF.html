
<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CFF</title>

<style>
:root{
  --bg:#f3e5f5;
  --accent:#F50870;
  --accent2:#9C27B0;
  --danger:#ff4d6d;
  --txt:#fff7fb;
  --muted:rgba(255,255,255,.75);
  --shadow:0 10px 30px rgba(0,0,0,.25);
  --radius:16px;
}

body{
  margin:0;
  font-family: system-ui, sans-serif;
  background:linear-gradient(180deg,#120516,#1b0830);
  color:var(--txt);
}

.wrap{max-width:720px;margin:auto;padding:16px;}

.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  margin:12px 0;
}

select, input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(20,6,34,.85); /* ✅ corrigé */
  color:white;
}

.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,.2);
  margin-top:6px;
}

.delbtn{
  background:linear-gradient(135deg,#ff4d6d,#F50870);
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
  <label>Personne</label>
  <select id="pers"></select>

  <label>Montant</label>
  <input type="number" id="montant">

  <button onclick="ajouter()">Ajouter</button>

  <div class="kpi">
    <div>Total<br><b id="kpiTotal">0</b></div>
    <div>Prix<br><b id="kpiPrix">0</b></div>
    <div>Diff<br><b id="kpiDiff">0</b></div>
  </div>
</div>

<div class="card">
  <b>Historique</b>
  <div id="liste"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxOJEus1Fev5I4YZsSbjpIXXlgGJBY7QmFkkqZtkXYD6eEPwqmgCl8r2hfrO1X9eyqxSA/exec";

const NAMES={
  jeremie:"Jérémie",
  antonin:"Antonin",
  yann:"Yann",
  melanie:"Mélanie"
};

const DEFAULTS={
  jeremie:{prix:120},
  antonin:{prix:120},
  yann:{prix:170},
  melanie:{prix:170}
};

let trips=[];
let config={};

// ✅ dropdown avec accents
function setPersons(){
  const sel=document.getElementById("pers");

  sel.innerHTML=Object.entries(NAMES)
    .map(([k,v])=>`<option value="${k}">${v}</option>`)
    .join("");

  sel.addEventListener("change",()=>{
    loadConfig().then(loadTrips);
  });
}

// ✅ config simple
async function loadConfig(){
  const p=document.getElementById("pers").value;
  const cfg=DEFAULTS[p] || {prix:0};
  document.getElementById("kpiPrix").textContent=cfg.prix+" CHF";
}

// ✅ historique
async function loadTrips(){
  const p=document.getElementById("pers").value;

  const txt=await fetch(API+"?sheet=CFF&action=lire&personne="+p)
    .then(r=>r.text());

  trips=[];
  const list=document.getElementById("liste");
  list.innerHTML="";

  if(txt && txt.trim()){
    txt.split("~~~~").forEach(l=>{
      const [date,pers,m,row]=l.split("|");
      const montant=parseFloat(m);

      if(!date || !montant) return;

      trips.push({date,pers,montant,row});

      list.innerHTML+=`
        <div class="item">
          <div>
            ${montant.toFixed(2)} CHF<br>
            <small>${date}</small>
          </div>
          <div>
            ${NAMES[pers] || pers}
            <button class="delbtn" onclick="supprimer(${row})">🗑️</button>
          </div>
        </div>
      `;
    });
  }

  compute();
}

// ✅ calcul
function compute(){
  let total=0;
  trips.forEach(t=>total+=t.montant);

  const p=document.getElementById("pers").value;
  const prix=DEFAULTS[p]?.prix || 0;

  const diff=total-prix;

  document.getElementById("kpiTotal").textContent=total.toFixed(2)+" CHF";
  document.getElementById("kpiDiff").textContent=(diff>=0?"+":"")+diff.toFixed(2)+" CHF";
}

// ✅ ajouter
async function ajouter(){
  const p=document.getElementById("pers").value;
  const montant=document.getElementById("montant").value;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"ajouter",
      personne:p,
      montant
    })
  });

  loadTrips();
}

// ✅ supprimer
async function supprimer(row){
  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"supprimer",
      row
    })
  });

  loadTrips();
}

// INIT
setPersons();
loadConfig();
loadTrips();
</script>

</body>
</html>
