<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CFF</title>

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background:linear-gradient(180deg,#120516,#1b0830);
}

.wrap{max-width:700px;margin:auto;padding:16px;}

.card{
  background:rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px;
  margin:12px 0;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:6px;
}

.btn{
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.kpi div{font-size:14px;}
.kpi b{font-size:18px;}

.progress{
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:20px;
  margin-top:10px;
  overflow:hidden;
}

#progressBar{
  height:100%;
  width:0%;
  background:linear-gradient(135deg,#F50870,#9C27B0);
}

.item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  background:rgba(0,0,0,.2);
  margin-top:6px;
}

.delbtn{
  background:#ff4d6d;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
  <label>Personne</label>
  <select id="pers"></select>

  <label>Montant</label>
  <input type="number" id="montant">

  <button class="btn primary" onclick="ajouter()">Ajouter</button>

  <div class="kpi">
    <div>Total<br><b id="kpiTotal">0</b></div>
    <div>Reste<br><b id="kpiReste">0</b></div>
    <div>Abonnement<br><b id="kpiPrix">0</b></div>
  </div>

  <div class="progress"><div id="progressBar"></div></div>

</div>

<div class="card">
  <b>Historique</b>
  <div id="liste"></div>
</div>

</div>

<script>
const API="TON_URL_APPS_SCRIPT";

let trips=[];
let prix=0;

// ✅ Dropdown
function setPersons(){
  const sel=document.getElementById("pers");
  const people=["jeremie","antonin","yann","melanie"];

  sel.innerHTML=people.map(p=>`<option value="${p}">${p}</option>`).join("");

  sel.addEventListener("change",loadTrips);
}

// ✅ Charger trajets
async function loadTrips(){
  const p=document.getElementById("pers").value;

  const txt=await fetch(API+"?sheet=CFF&action=lire&personne="+p).then(r=>r.text());

  trips=[];
  const list=document.getElementById("liste");
  list.innerHTML="";

  if(txt){
    txt.split("~~~~").forEach(l=>{
      const [date,pers,m,row]=l.split("|");
      const montant=parseFloat(m);

      if(!date||!montant)return;

      trips.push({date,pers,montant,row});

      list.innerHTML+=`
        <div class="item">
          <div>${montant} CHF<br><small>${date}</small></div>
          <button class="delbtn" onclick="supprimer(${row})">🗑️</button>
        </div>`;
    });
  }

  compute();
}

// ✅ Calcul KPI
function compute(){
  let total=0;
  trips.forEach(t=>total+=t.montant);

  document.getElementById("kpiTotal").textContent=total.toFixed(2);

  const reste=prix-total;
  document.getElementById("kpiReste").textContent=
    reste>0 ? reste.toFixed(2)+" CHF" : "OK";

  document.getElementById("kpiPrix").textContent=prix;

  const percent=prix>0 ? Math.min(100,total/prix*100):0;
  document.getElementById("progressBar").style.width=percent+"%";
}

// ✅ Ajouter
async function ajouter(){
  const p=document.getElementById("pers").value;
  const montant=document.getElementById("montant").value;

  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"ajouter",
      personne:p,
      montant
    })
  });

  loadTrips();
}

// ✅ Supprimer
async function supprimer(row){
  await fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      sheet:"CFF",
      action:"supprimer",
      row
    })
  });

  loadTrips();
}

// INIT
setPersons();
prix=150; // 👉 mets ton prix ici ou via config
loadTrips();
</script>

</body>
</html>
