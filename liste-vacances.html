<script>

localStorage.getItem("custom_moi")

const allBoxes = document.querySelectorAll(
  'input[type="checkbox"]'
);

allBoxes.forEach((box,index)=>{

  const key = "vacances_" + index;

  box.checked = localStorage.getItem(key)==="1";

  box.addEventListener("change",()=>{

    localStorage.setItem(
      key,
      box.checked ? "1" : "0"
    );

    updateProgress();

  });

});



function updateProgress(){

  document.querySelectorAll(".saison").forEach(saison=>{

    const boxes=saison.querySelectorAll("input[type=checkbox]");
    const checked=saison.querySelectorAll("input[type=checkbox]:checked");

    const total=boxes.length;
    const done=checked.length;

    const id=saison.id;

    document.getElementById("prog-"+id).textContent=
      `(${done}/${total})`;

    document.getElementById("txt-"+id).textContent=
      `${done} élément(s) préparé(s) sur ${total}`;
  });
}
function resetAll(){

  if(!confirm("Effacer toutes les coches de toutes les listes ?")){
    return;
  }

document
  .querySelectorAll("input[type=checkbox]")
  .forEach((box,index)=>{

    box.checked = false;

    localStorage.setItem(
      "vacances_" + index,
      "0"
    );

  });

  updateProgress();
}
 function deleteCustomItem(index){

  const liste = JSON.parse(
    localStorage.getItem("custom_moi") || "[]"
  );

  liste.splice(index,1);

  localStorage.setItem(
    "custom_moi",
    JSON.stringify(liste)
  );

  renderCustomItems();
  updateProgress();
}

function toggleCustomItem(index,value){

  const liste = JSON.parse(
    localStorage.getItem("custom_moi") || "[]"
  );

  liste[index].checked = value;

  localStorage.setItem(
    "custom_moi",
    JSON.stringify(liste)
  );

  updateProgress();
}

function renderCustomItems(){

  const container =
    document.getElementById("custom-moi");

  if(!container) return;

  const liste = JSON.parse(
    localStorage.getItem("custom_moi") || "[]"
  );

  container.innerHTML = "";

  liste.forEach((item,index)=>{

    container.innerHTML += `
       <div class="custom-item">

        <label style="flex:1">
          <input
            type="checkbox"
            ${item.checked ? "checked" : ""}
            onchange="toggleCustomItem(${index},this.checked)">
          ${item.nom}
        </label>

        <button onclick="deleteCustomItem(${index})">
          ❌
        </button>

      </div>
    `;
  });
}

function addCustomItem(){

  const input = document.getElementById("input-moi");
  const texte = input.value.trim();

  if(!texte) return;

  const liste = JSON.parse(
    localStorage.getItem("custom_moi") || "[]"
  );

  liste.push({
    nom: texte,
    checked: false
  });

  localStorage.setItem(
    "custom_moi",
    JSON.stringify(liste)
  );

  input.value = "";

  renderCustomItems();
  updateProgress();
}
  function addCustomItemGeneric(section){

  const input =
    document.getElementById("input-" + section);

  const texte = input.value.trim();

  if(!texte) return;

  const storageKey = "custom_" + section;

  const liste = JSON.parse(
    localStorage.getItem(storageKey) || "[]"
  );

  liste.push({
    nom: texte,
    checked:false
  });

  localStorage.setItem(
    storageKey,
    JSON.stringify(liste)
  );

  input.value = "";

  renderCustomItemsGeneric(section);
  updateProgress();
}

function renderCustomItemsGeneric(section){

  const container =
    document.getElementById("custom-" + section);

  if(!container) return;

  const storageKey = "custom_" + section;

  const liste = JSON.parse(
    localStorage.getItem(storageKey) || "[]"
  );

  container.innerHTML = "";

  liste.forEach((item,index)=>{

    container.innerHTML += `
      <div class="custom-item">

        <label style="flex:1">
          <input
            type="checkbox"
            ${item.checked ? "checked" : ""}
            onchange="toggleCustomItemGeneric('${section}',${index},this.checked)">
          ${item.nom}
        </label>

        <button onclick="deleteCustomItemGeneric('${section}',${index})">
          ❌
        </button>

      </div>
    `;
  });
}

function toggleCustomItemGeneric(section,index,value){

  const storageKey = "custom_" + section;

  const liste = JSON.parse(
    localStorage.getItem(storageKey) || "[]"
  );

  liste[index].checked = value;

  localStorage.setItem(
    storageKey,
    JSON.stringify(liste)
  );

  updateProgress();
}

function deleteCustomItemGeneric(section,index){

  const storageKey = "custom_" + section;

  const liste = JSON.parse(
    localStorage.getItem(storageKey) || "[]"
  );

  liste.splice(index,1);

  localStorage.setItem(
    storageKey,
    JSON.stringify(liste)
  );

  renderCustomItemsGeneric(section);
  updateProgress();
}
function resetSeason(id){

  if(!confirm("Effacer toutes les coches de cette saison ?")) return;

  const boxes=document
    .getElementById(id)
    .querySelectorAll("input[type=checkbox]");

  boxes.forEach(box=>{
    box.checked=false;
  });

  document
    .querySelectorAll("input[type=checkbox]")
    .forEach((box,index)=>{
      localStorage.setItem(
        "vacances_"+index,
        box.checked ? "1" : "0"
      );
    });

  updateProgress();
}

renderCustomItemsGeneric("sport");
renderCustomItemsGeneric("medicaments");
renderCustomItemsGeneric("toilette");
renderCustomItemsGeneric("paddle");
  renderCustomItemsGeneric("ski");

renderCustomItems();
updateProgress();

</script>
