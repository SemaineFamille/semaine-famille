<script>
const personne =
  (localStorage.getItem("lastChild") || "Commun")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

const STORAGE_KEY = "custom_moi_" + personne;

const nomPersonne =
  localStorage.getItem("lastChild") || "Commun";

document.getElementById("titre-vacances").innerHTML =
  `🧳 Ma liste vacances<br>
   <span style="
      font-size:0.7em;
      color:#666;
      font-weight:600">
      ${nomPersonne}
   </span>`;

allBoxes.forEach((box,index)=>{
const allBoxes = document.querySelectorAll("input[type=checkbox]");
  const key = "vacances_" + index;

  box.checked = localStorage.getItem(key)==="1";

  box.addEventListener("change",()=>{
    localStorage.setItem(key,box.checked ? "1":"0");
    updateProgress();
  });

});

function updateProgress(){

  document.querySelectorAll(".saison").forEach(saison=>{

    const boxes=saison.querySelectorAll("input[type=checkbox]");
    const checked=saison.querySelectorAll("input[type=checkbox]:checked");

    const total=boxes.length;
    const done=checked.length;

    const id=saison.id;

    document.getElementById("prog-"+id).textContent=
      `(${done}/${total})`;

    document.getElementById("txt-"+id).textContent=
      `${done} élément(s) préparé(s) sur ${total}`;
  });
}
function resetAll(){

  if(!confirm("Effacer toutes les coches de toutes les listes ?")){
    return;
  }

  document
    .querySelectorAll("input[type=checkbox]")
    .forEach((box,index)=>{
      box.checked = false;
      localStorage.setItem("vacances_"+index,"0");
    });

  updateProgress();
}
 function deleteCustomItem(index){

  const liste = JSON.parse(
    localStorage.getItem(STORAGE_KEY) || "[]"
  );

  liste.splice(index,1);

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(liste)
  );

  renderCustomItems();
  updateProgress();
}

function toggleCustomItem(index,value){

  const liste = JSON.parse(
    localStorage.getItem(STORAGE_KEY) || "[]"
  );

  liste[index].checked = value;

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(liste)
  );

  updateProgress();
}

function renderCustomItems(){

  const container =
    document.getElementById("custom-moi");

  if(!container) return;

  const liste = JSON.parse(
    localStorage.getItem(STORAGE_KEY) || "[]"
  );

  container.innerHTML = "";

  liste.forEach((item,index)=>{

    container.innerHTML += `
       <div class="custom-item">

        <label style="flex:1">
          <input
            type="checkbox"
            ${item.checked ? "checked" : ""}
            onchange="toggleCustomItem(${index},this.checked)">
          ${item.nom}
        </label>

        <button onclick="deleteCustomItem(${index})">
          ❌
        </button>

      </div>
    `;
  });
}

function addCustomItem(){

  const input = document.getElementById("input-moi");
  const texte = input.value.trim();

  if(!texte) return;

  const liste = JSON.parse(
    localStorage.getItem(STORAGE_KEY) || "[]"
  );

  liste.push({
    nom: texte,
    checked: false
  });

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(liste)
  );

  input.value = "";
  

  renderCustomItems();
  updateProgress();

});
}
function resetSeason(id){

  if(!confirm("Effacer toutes les coches de cette saison ?")) return;

  const boxes=document
    .getElementById(id)
    .querySelectorAll("input[type=checkbox]");

  boxes.forEach(box=>{
    box.checked=false;
  });

  document
    .querySelectorAll("input[type=checkbox]")
    .forEach((box,index)=>{
      localStorage.setItem(
        "vacances_"+index,
        box.checked ? "1" : "0"
      );
    });

  updateProgress();
}



renderCustomItems();
updateProgress();

</script>
