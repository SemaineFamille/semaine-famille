<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda familial</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f8fafc;
  margin: 0;
  padding: 20px;
  color: #0f172a;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid #e2e8f0;
}

h1 {
  margin: 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 20px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-size: 14px;
}

textarea {
  min-height: 80px;
}

.button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.item {
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.badge {
  background: #e2e8f0;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  margin-right: 6px;
}

.badge-outline {
  border: 1px solid #cbd5e1;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
}

.delete {
  background: none;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  cursor: pointer;
  padding: 6px 10px;
}
</style>

</head>
<body>

<div class="container">

  <div class="card">
    <h1>Agenda familial</h1>
    <p>Ajoute une date, un créneau horaire, une activité et un commentaire.</p>
  </div>

  <div class="grid">

    <!-- FORMULAIRE -->
    <div class="card">

      <h2>Ajouter une activité</h2>

      <label>Date</label>
      <input type="date" id="date">

      <div style="display:flex; gap:10px;">
        <div style="flex:1;">
          <label>Début</label>
          <input type="time" id="start">
        </div>

        <div style="flex:1;">
          <label>Fin</label>
          <input type="time" id="end">
        </div>
      </div>

      <label>Activité</label>
      <input type="text" id="activity" placeholder="Ex: école, train, sport">

      <label>Commentaire</label>
      <textarea id="comment"></textarea>

      <div id="error" style="color:red; margin-top:10px;"></div>

      <button class="button" onclick="addActivity()">Ajouter</button>

    </div>

    <!-- LISTE -->
    <div class="card">

      <h2>Activités à venir</h2>

      <input type="text" id="search" placeholder="Rechercher..." onkeyup="render()">

      <div id="list"></div>

    </div>

  </div>

</div>

<script>

let activities = [];

function formatDate(date) {
  return new Date(date).toLocaleDateString("fr-FR", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });
}

function isFuture(item) {
  let end = item.end || item.start || "23:59";
  let date = new Date(item.date + "T" + end);
  return date.getTime() >= Date.now();
}

function addActivity() {
  let date = document.getElementById("date").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;
  let activity = document.getElementById("activity").value;
  let comment = document.getElementById("comment").value;
  let error = document.getElementById("error");

  error.innerText = "";

  if (!date || !start || !end || !activity) {
    error.innerText = "Merci de remplir tous les champs obligatoires.";
    return;
  }

  if (end <= start) {
    error.innerText = "Heure de fin invalide.";
    return;
  }

  let item = {
    id: Date.now(),
    date,
    start,
    end,
    activity,
    comment
  };

  if (!isFuture(item)) {
    error.innerText = "Activité déjà passée.";
    return;
  }

  activities.push(item);
  clearForm();
  render();
}

function clearForm() {
  document.getElementById("date").value = "";
  document.getElementById("start").value = "";
  document.getElementById("end").value = "";
  document.getElementById("activity").value = "";
  document.getElementById("comment").value = "";
}

function deleteActivity(id) {
  activities = activities.filter(a => a.id !== id);
  render();
}

function render() {
  let list = document.getElementById("list");
  let search = document.getElementById("search").value.toLowerCase();

  let filtered = activities
    .filter(isFuture)
    .filter(a => (
      (a.activity + a.comment).toLowerCase().includes(search)
    ))
    .sort((a, b) => (a.date + a.start).localeCompare(b.date + b.start));

  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = "<p>Aucune activité à venir.</p>";
    return;
  }

  filtered.forEach(a => {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        <div>
          <span class="badge">${formatDate(a.date)}</span>
          <span class="badge-outline">${a.start} - ${a.end}</span>
        </div>
        <div style="font-weight:bold; font-size:18px; margin-top:5px;">
          ${a.activity}
        </div>
        <div style="color:#475569;">
          ${a.comment || ""}
        </div>
      </div>

      <button class="delete" onclick="deleteActivity(${a.id})">
        ✕
      </button>
    `;

    list.appendChild(div);
  });
}

render();

</script>

</body>
</html>
