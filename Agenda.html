<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --accent:#F50870;
  --accent2:#9C27B0;
  --txt:#fff;
}

/* 🌈 FOND identique à VACANCES */
body{
  margin:0;
  font-family:system-ui;
  color:var(--txt);

  background:
    radial-gradient(700px 500px at 10% 0%, rgba(255,255,255,.2), transparent),
    radial-gradient(700px 500px at 90% 0%, rgba(255,255,255,.2), transparent),
    linear-gradient(135deg,#F8BBD0,#E1BEE7,#CE93D8);
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:flex-end;
  box-sizing:border-box;
  z-index:10;
  padding:12px 26px;
}

.backbtn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;
  padding:12px 16px;
  border-radius:14px;
  font-weight:900;
  color:white;
  cursor:pointer;
}

/* LAYOUT */
.wrap{
  max-width:720px;
  margin-right:6px;
  padding:92px 16px 16px;
  box-sizing:border-box;
}

.card{
  background:rgba(255,255,255,.85);
  color:black;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

/* GRID ALIGNEMENT */
.row{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  min-width:0;
}

/* INPUT */
select,input,textarea{
  width:100%;
  box-sizing:border-box;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:18px;
  font-family:inherit;
}

input, select{
  height:48px;
  padding:0 12px;
}

textarea{
  padding:12px;
  min-height:96px;
  resize:vertical;
}

/* BOUTON */
.primary{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:14px;
  border:none;
  font-weight:900;
  font-size:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  cursor:pointer;
}

/* RECHERCHE */
#search{
  margin-top:10px;
}

/* BLOCS INFO */
.statRow{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:12px;
}

.stat{
  background:white;
  border-radius:12px;
  padding:12px;
}

.stat small{
  display:block;
  opacity:.7;
  margin-bottom:4px;
}

.stat b{
  font-size:24px;
}

/* LISTE AGENDA */
.item{
  background:#f3e5f5;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:8px;
}

.badge{
  background:white;
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
  font-weight:700;
}

.title{
  font-size:20px;
  font-weight:900;
  margin-bottom:6px;
}

.comment{
  opacity:.8;
  white-space:pre-line;
}

.actions{
  display:flex;
  justify-content:flex-end;
  margin-top:10px;
}

.deleteBtn{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* MESSAGES */
.msg{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
